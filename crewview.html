<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DreamVille 2026 — Crewplanning (weergave)</title>
<style>
:root {
  --bg: #0d0f18;
  --surface: #161926;
  --surface2: #1e2235;
  --border: #2a2f47;
  --text: #e4e8f5;
  --muted: #7a84a8;
  --accent: #6c63ff;
  --ae: #42a5f5;
  --rw: #ef5350;
  --tw: #ffa726;
  --fl: #ab47bc;
  --green: #4caf50;
  --yellow: #ffd54f;
  --ph-opbouw: #42a5f5;
  --ph-show: #ff6b35;
  --ph-afbouw: #4caf50;
}
:root[data-theme="light"] {
  --bg: #f3f4f9;
  --surface: #ffffff;
  --surface2: #eceef6;
  --border: #d8dce8;
  --text: #1c1f2e;
  --muted: #6b7390;
  --accent: #6c63ff;
  --ae: #1e88e5;
  --rw: #e53935;
  --tw: #fb8c00;
  --fl: #8e24aa;
  --green: #2e7d32;
  --yellow: #c9920a;
  --ph-opbouw: #1e88e5;
  --ph-show: #f4511e;
  --ph-afbouw: #2e7d32;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; height: 100dvh; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; min-height: 100dvh; }

/* ── HEADER ── */
header { flex-shrink: 0; background: var(--surface); border-bottom: 1px solid var(--border); padding: 10px 18px; display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
.logo { font-size: 15px; font-weight: 800; letter-spacing: -0.3px; white-space: nowrap; }
.logo span { color: var(--accent); }
.viewbadge { padding: 4px 10px; border-radius: 10px; font-size: 11px; font-weight: 700; white-space: nowrap; background: rgba(108,99,255,.15); color: var(--accent); border: 1px solid rgba(108,99,255,.3); }
.countdown { padding: 4px 10px; border-radius: 10px; font-size: 11px; font-weight: 700; white-space: nowrap; background: rgba(255,213,80,.12); color: var(--yellow); border: 1px solid rgba(255,213,80,.25); }
.countdown.live { background: rgba(76,175,80,.15); color: var(--green); border-color: rgba(76,175,80,.3); }
.countdown.past { background: rgba(100,100,120,.1); color: var(--muted); border-color: var(--border); }
.phase-tabs { display: flex; gap: 4px; }
.ptab { padding: 5px 13px; border-radius: 20px; font-size: 11px; font-weight: 700; cursor: pointer; border: none; background: var(--surface2); color: var(--muted); transition: all 0.15s; letter-spacing: 0.03em; font-family: inherit; }
.ptab[href] { text-decoration: none; display: inline-flex; align-items: center; }
.ptab[href]:hover { color: var(--text); background: var(--border); }
.ptab.op.active { background: rgba(66,165,245,.2); color: var(--ae); }
.ptab.sh.active { background: rgba(255,107,53,.2); color: var(--ph-show); }
.ptab.af.active { background: rgba(76,175,80,.2); color: var(--green); }
.ptab.tk.active { background: rgba(108,99,255,.2); color: var(--accent); }
.view-tabs { display: flex; gap: 4px; padding-left: 10px; margin-left: 6px; border-left: 1px solid var(--border); }
.legend { margin-left: auto; display: flex; gap: 14px; flex-wrap: wrap; }
.li { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--muted); }
.ld { width: 9px; height: 9px; border-radius: 50%; }
#syncIndicator { font-size: 11px; }
.ptab.mat.active { background: rgba(255,213,80,.2); color: var(--yellow); }
.ptab.toggle.active { background: rgba(108,99,255,.2); color: var(--accent); }
.filter-select { padding: 5px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; cursor: pointer; border: 1px solid var(--border); background: var(--surface2); color: var(--text); font-family: inherit; letter-spacing: 0.03em; }
.progress-pill { font-size: 11px; font-weight: 700; padding: 2px 9px; border-radius: 10px; background: rgba(76,175,80,.15); color: var(--green); border: 1px solid rgba(76,175,80,.3); margin-left: 8px; vertical-align: middle; }
/* ── Voortgangsbalk per dag ── */
.day-progress { margin-top: 12px; padding-top: 10px; border-top: 1px solid var(--border); }
.day-progress-label { display: flex; justify-content: space-between; align-items: center; font-size: 11px; color: var(--muted); margin-bottom: 5px; }
.day-progress-label b { color: var(--text); }
.day-progress-bar { height: 5px; background: var(--border); border-radius: 3px; overflow: hidden; }
.day-progress-fill { height: 100%; border-radius: 3px; background: var(--green); transition: width .4s; }
.day-progress-fill.half { background: var(--yellow); }
.day-progress-fill.low  { background: var(--rw); }

/* Materiaalplanning */
.mat-week { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; margin-bottom: 10px; }
.mat-week-title { font-size: 13px; font-weight: 800; margin-bottom: 8px; }
.mat-pills { display: flex; flex-wrap: wrap; gap: 6px; }
.mat-pill { font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 10px; background: var(--bg); border: 1px solid var(--border); color: var(--text); }
.mat-intro { font-size: 12px; color: var(--muted); margin-bottom: 14px; line-height: 1.5; }

/* ── Contactenlijst ── */
.contact-group { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; margin-bottom: 12px; }
.contact-group-title { font-size: 13px; font-weight: 800; margin-bottom: 8px; }
.contact-col-header { display: grid; grid-template-columns: 1fr 1fr 130px; gap: 6px; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .05em; color: var(--muted); padding: 0 6px 4px; }
.contact-table { display: flex; flex-direction: column; gap: 5px; }
.contact-row.cr-ro { display: grid; grid-template-columns: 1fr 1fr 130px; align-items: center; gap: 6px; font-size: 12px; padding: 6px 8px; background: var(--surface); border-radius: 6px; border: 1px solid var(--border); }
.contact-role { font-weight: 600; color: var(--fg); }
.contact-name { color: var(--muted); }
.contact-tel { text-align: right; }
.contact-phone { color: var(--blue); text-decoration: none; font-weight: 600; }
.contact-phone:hover { text-decoration: underline; }
.contact-empty { color: var(--border); font-style: italic; }

/* ── APP BODY / SIDEBAR ── */
.app-body { flex: 1; display: flex; overflow: hidden; }
.sidebar { width: 68px; flex-shrink: 0; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 8px 0; gap: 2px; overflow-y: auto; }
.nav-item { background: none; border: none; border-left: 3px solid transparent; color: var(--muted); cursor: pointer; padding: 11px 4px; display: flex; flex-direction: column; align-items: center; gap: 4px; font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; transition: all .15s; font-family: inherit; }
.nav-item .ni-icon { font-size: 18px; line-height: 1; }
.nav-item:hover { color: var(--text); background: var(--surface2); }
.nav-item.active { color: var(--accent); border-left-color: var(--accent); background: rgba(108,99,255,.08); }
.nav-link { text-decoration: none; margin-top: auto; }

/* ── CONTENT ── */
.content-area { flex: 1; overflow-y: auto; padding: 20px; }
.content-area h2 { margin-bottom: 14px; font-size: 18px; font-weight: 800; }

/* ── WERKTIJDEN ── */
.hours-card { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; margin-bottom: 16px; }
.hours-title { font-size: 14px; font-weight: 800; margin-bottom: 10px; }
.hours-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px,1fr)); gap: 10px; margin-bottom: 10px; }
.hours-item { background: var(--bg); border: 1px solid var(--border); border-left-width: 3px; border-radius: 8px; padding: 8px 12px; font-size: 13px; }
.hours-item.ae { border-left-color: var(--ae); }
.hours-item.rw { border-left-color: var(--rw); }
.hours-item.tw { border-left-color: var(--tw); }
.hours-item b { display: block; font-size: 12px; color: var(--muted); margin-bottom: 2px; font-weight: 700; }
.hours-note { font-size: 12px; color: var(--muted); line-height: 1.6; }
.weather-widget { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 12px 16px; margin-bottom: 16px; }
.weather-loc { font-size: 12px; font-weight: 700; color: var(--muted); margin-bottom: 8px; }
.weather-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px,1fr)); gap: 10px; }
.weather-card { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 8px 10px; text-align: center; }
.weather-card.risk-warn { background: rgba(255,152,0,.15); border-color: rgba(255,152,0,.5); }
.weather-card.risk-danger { background: rgba(239,83,80,.15); border-color: rgba(239,83,80,.5); }
.weather-day { font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; }
.weather-icon { font-size: 22px; margin: 4px 0 2px; }
.weather-temp { font-size: 13px; font-weight: 700; }
.weather-indicators { display: flex; justify-content: center; gap: 5px; margin-top: 6px; }
.wi { font-size: 13px; opacity: .2; }
.wi.warn { opacity: 1; color: #ff9800; }
.wi.danger { opacity: 1; color: #ef5350; }
.weather-loading, .weather-na { font-size: 12px; color: var(--muted); }

/* ── DAY CARDS ── */
.home-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px,1fr)); gap: 16px; align-items: start; }
.home-card { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; }
.home-card.today { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent) inset; }
.home-card-head { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 10px; padding-bottom: 8px; border-bottom: 1px solid var(--border); gap: 8px; }
.home-card-title { font-size: 15px; font-weight: 800; display: flex; align-items: center; gap: 7px; }
.home-card-date { font-size: 12px; color: var(--muted); }
.today-pill { font-size: 9px; font-weight: 800; padding: 1px 7px; border-radius: 8px; background: rgba(108,99,255,.2); color: var(--accent); text-transform: uppercase; letter-spacing: 0.06em; }
.home-slot { margin-bottom: 14px; }
.home-slot:last-child { margin-bottom: 0; }
.home-slot-head { font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; }

/* Crew chips */
.crew-chips { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 14px; }
.ck { padding: 4px 10px; border-radius: 10px; font-size: 11px; font-weight: 700; }
.ck.ae { background: rgba(66,165,245,.15); color: var(--ae); border: 1px solid rgba(66,165,245,.25); }
.ck.rw { background: rgba(239,83,80,.15); color: var(--rw); border: 1px solid rgba(239,83,80,.25); }
.ck.tw { background: rgba(255,167,38,.15); color: var(--tw); border: 1px solid rgba(255,167,38,.25); }
.ck.fl { background: rgba(171,71,188,.15); color: var(--fl); border: 1px solid rgba(171,71,188,.25); }

/* Task items (read-only) */
.ti-wrap { display: flex; flex-direction: column; gap: 7px; }
.titem { background: var(--bg); border-radius: 9px; padding: 10px 11px; border: 1px solid var(--border); display: flex; gap: 9px; align-items: flex-start; }
.tcheck { width: 17px; height: 17px; min-width: 17px; border-radius: 4px; border: 2px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 10px; margin-top: 1px; }
.tcheck.done { background: var(--green); border-color: var(--green); color: #fff; }
.tcheck.bezig { background: var(--yellow); border-color: var(--yellow); color: #1a1a1a; }
.tc-body { flex: 1; min-width: 0; }
.tc-title { font-size: 13px; font-weight: 600; color: var(--text); }
.tc-title.done { text-decoration: line-through; color: var(--muted); }
.tc-title.bezig { color: var(--yellow); }
.tc-meta { display: flex; gap: 5px; align-items: center; margin-top: 3px; flex-wrap: wrap; }
.tc-assignee { font-size: 11px; color: var(--fl); font-weight: 600; }
.tc-prio { font-size: 10px; padding: 1px 6px; border-radius: 8px; font-weight: 700; }
.tc-prio.hoog { background: rgba(239,83,80,.2); color: #ef5350; }
.tc-prio.middel { background: rgba(255,167,38,.2); color: #ffa726; }
.tc-prio.laag { background: rgba(76,175,80,.2); color: #4caf50; }
.tc-team { font-size: 10px; padding: 1px 7px; border-radius: 8px; font-weight: 700; }
.tc-team.ae { background: rgba(66,165,245,.2); color: var(--ae); }
.tc-team.rw { background: rgba(239,83,80,.2); color: var(--rw); }
.tc-team.tw { background: rgba(255,167,38,.2); color: var(--tw); }
.tc-zone { font-size: 10px; padding: 1px 7px; border-radius: 8px; font-weight: 700; background: rgba(38,166,154,.18); color: #26a69a; border: 1px solid rgba(38,166,154,.3); }
.tc-notes { font-size: 11px; color: var(--muted); margin-top: 4px; line-height: 1.4; }
.tc-info-icon { display: inline-flex; align-items: center; justify-content: center; cursor: pointer; font-size: 12px; margin-left: 5px; opacity: .75; vertical-align: middle; }
.tc-info-icon:hover { opacity: 1; }
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.5); display: flex; align-items: center; justify-content: center; z-index: 1000; padding: 20px; }
.modal-box { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 16px 18px; max-width: 420px; width: 100%; max-height: 80vh; overflow-y: auto; }
.modal-box h3 { font-size: 15px; font-weight: 800; margin-bottom: 10px; }
.form-btns { display: flex; gap: 7px; margin-top: 10px; }
.btn-sec { background: var(--surface); color: var(--muted); border: 1px solid var(--border); border-radius: 7px; padding: 6px 13px; font-size: 12px; cursor: pointer; }
.tc-subprogress { font-size: 10px; color: var(--muted); font-weight: 700; }
.subtasks { margin-top: 6px; display: flex; flex-direction: column; gap: 4px; padding-left: 2px; }
.subitem { display: flex; align-items: center; gap: 7px; }
.subcheck { width: 14px; height: 14px; min-width: 14px; border-radius: 4px; border: 2px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 9px; }
.subcheck.done { background: var(--green); border-color: var(--green); color: #fff; }
.subcheck.bezig { background: var(--yellow); border-color: var(--yellow); color: #1a1a1a; }
.subtitle { font-size: 12px; color: var(--text); flex: 1; }
.subtitle.done { text-decoration: line-through; color: var(--muted); }
.subtitle.bezig { color: var(--yellow); }
.tc-matbadge { font-size: 10px; color: var(--muted); font-weight: 700; }
.materials-ro { margin-top: 6px; font-size: 11px; color: var(--text); line-height: 1.5; padding-top: 6px; border-top: 1px dashed var(--border); }
.materials-ro b { color: var(--muted); font-weight: 700; }
.mat-ro-extra { margin-top: 2px; color: var(--muted); }
.empty-msg { text-align: center; color: var(--muted); font-size: 13px; padding: 22px 0; }

/* Takenoverzicht */
.sec-title { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; margin-top: 18px; }
.sec-title:first-of-type { margin-top: 0; }
.sec-title h3 { font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.07em; }
.task-overview-day { font-size: 12px; font-weight: 700; color: var(--text); margin-bottom: 6px; }
.task-overview-block { margin-bottom: 14px; }
/* ── Verleden-toggle (planning) ── */
.past-toggle { margin-top: 10px; margin-bottom: 4px; font-size: 11px; font-weight: 700; color: var(--muted); cursor: pointer; user-select: none; display: inline-flex; align-items: center; gap: 5px; padding: 5px 0; }
.past-toggle:hover { color: var(--text); }
.past-arrow { font-size: 9px; }
.past-panel { margin-top: 10px; padding-top: 10px; border-top: 1px dashed var(--border); }
/* ── Weergave-toggle + takenkalender ── */
.tasks-view-toggle { display: flex; gap: 4px; margin-bottom: 14px; }
.tasks-view-toggle button { padding: 5px 13px; border-radius: 20px; font-size: 11px; font-weight: 700; cursor: pointer; border: 1px solid var(--border); background: var(--surface2); color: var(--muted); transition: all 0.15s; letter-spacing: 0.03em; }
.tasks-view-toggle button.active { background: var(--accent); border-color: var(--accent); color: #fff; }
.tcal-month { margin-bottom: 20px; }
.tcal-month-label { font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 5px; }
.tcal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; }
.tcal-dow { font-size: 10px; color: var(--muted); text-align: center; font-weight: 700; padding-bottom: 3px; }
.tcal-day { border-radius: 7px; min-height: 52px; padding: 4px 5px; box-sizing: border-box; border: 1px solid transparent; display: flex; flex-direction: column; gap: 2px; }
.tcal-day.empty { visibility: hidden; }
.tcal-no-slot .tcal-daynum { opacity: .2; }
.tcal-has-tasks { background: var(--surface2); border-color: var(--border); }
.tcal-today .tcal-daynum { color: var(--accent); }
.tcal-daynum { font-size: 10px; font-weight: 700; color: var(--muted); display: flex; align-items: center; gap: 3px; line-height: 1; margin-bottom: 1px; }
.tcal-today-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--accent); flex-shrink: 0; }
.tcal-task-chip { font-size: 9px; line-height: 1.35; padding: 2px 5px; border-radius: 4px; background: var(--accent); color: #fff; cursor: pointer; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-weight: 600; opacity: .9; transition: opacity .12s; }
.tcal-task-chip:hover { opacity: 1; }
.tcal-task-chip.done { background: var(--green); opacity: .55; }
.tcal-task-chip.bezig { background: var(--yellow); color: #1a1a1a; }

/* ── MOBILE ── */
@media (max-width: 860px) {
  header { padding: 8px 10px; gap: 8px; }
  .legend { display: none; }
  .logo { font-size: 13px; }
}
@media (max-width: 600px) {
  header { gap: 6px; }
  .viewbadge { display: none; }
  .filter-select { max-width: 120px; }
  .home-grid { grid-template-columns: 1fr; }
}
</style>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css" />
</head>
<body>
<div id="authGate" style="position:fixed;inset:0;z-index:99999;background:#0d0f18;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;">
  <div style="font-weight:800;font-size:18px;color:#e4e8f5;">DreamVille <span style="color:#6c63ff">2026</span></div>
  <input id="authInput" type="password" placeholder="Toegangscode" autocomplete="off" style="padding:10px 14px;border-radius:8px;border:1px solid #2a2f47;background:#1e2235;color:#e4e8f5;font-size:14px;width:220px;text-align:center;">
  <button id="authBtn" style="padding:10px 20px;border-radius:8px;border:none;background:#6c63ff;color:#fff;font-weight:700;cursor:pointer;font-size:14px;">Ontgrendelen</button>
  <div id="authError" style="color:#ef5350;font-size:12px;height:14px;"></div>
</div>
<script>
(function(){
  var KEY='dv26_access', CODE='specialecrewplanning';
  if (localStorage.getItem(KEY) === 'ok') {
    document.getElementById('authGate').remove();
  } else {
    function tryUnlock(){
      var val = document.getElementById('authInput').value;
      if (val === CODE) {
        localStorage.setItem(KEY,'ok');
        document.getElementById('authGate').remove();
      } else {
        document.getElementById('authError').textContent = 'Foute code, probeer opnieuw.';
        document.getElementById('authInput').value = '';
      }
    }
    document.getElementById('authBtn').addEventListener('click', tryUnlock);
    document.getElementById('authInput').addEventListener('keydown', function(e){ if(e.key==='Enter') tryUnlock(); });
    document.getElementById('authInput').focus();
  }
})();
</script>
<script>
(function(){
  var T_KEY='dv26_theme';
  function currentTheme(){ return localStorage.getItem(T_KEY) || 'dark'; }
  function applyTheme(t){
    document.documentElement.setAttribute('data-theme', t);
    var btn = document.getElementById('themeToggleBtn');
    if(btn) btn.textContent = (t==='light' ? '☀️' : '🌙');
  }
  window.toggleTheme = function(){
    var next = currentTheme()==='light' ? 'dark' : 'light';
    localStorage.setItem(T_KEY, next);
    applyTheme(next);
  };
  applyTheme(currentTheme());
  document.addEventListener('DOMContentLoaded', function(){ applyTheme(currentTheme()); });
})();
</script>
<header>
  <div class="logo">DreamVille <span>2026</span> — Crewplanning</div>
  <span class="viewbadge">🔒 Weergave — alleen lezen</span>
  <button class="ptab" id="themeToggleBtn" onclick="toggleTheme()" title="Wissel lichte/donkere modus">🌙</button>
  <button class="ptab" id="jumpTodayBtn" title="Ga naar vandaag">📍 Vandaag</button>
  <span id="openingCountdown" class="countdown"></span>
  <div class="phase-tabs" id="phaseTabs" style="display:none">
    <button class="ptab op" data-phase="opbouw">Opbouw</button>
    <button class="ptab sh" data-phase="show">Show</button>
    <button class="ptab af" data-phase="afbouw">Afbouw</button>
  </div>
  <select class="filter-select" id="crewFilter" title="Filter op team of persoon">
    <option value="all">👥 Iedereen</option>
    <optgroup label="Team">
      <option value="team:All Events">All Events</option>
      <option value="team:Radarwerk">Radarwerk</option>

function teamMaxForSlot(slot, teamLabel) {
  if(!slot) return 0;
  if(teamLabel==='All Events' && slot.ae) return 1 + (slot.ae.sh||0);
  if(teamLabel==='Radarwerk' && slot.rw) return 1 + (slot.rw.arc||0);
  if(teamLabel==='Team Wauw' && slot.tw) return (slot.tw.pro||0)+(slot.tw.senior||0)+(slot.tw.junior||0);
  return 0;
}
function teamClsForLabel(teamLabel) {
  const sec = TEAM_SECTIONS.find(s=>s.label===teamLabel);
  return sec ? sec.cls : '';
}
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ── Info-icoon (extra info per taak) ──
function showTaskInfo(slotId, taskId) {
  const tasks = getTasksForSlot(slotId);
  const t = tasks.find(x=>x.id===taskId);
  if(!t || !t.notes) return;
  const html = `<div class="modal-overlay" id="infoModal" onclick="if(event.target===this) closeInfoModal()">
    <div class="modal-box">
      <h3>ℹ️ ${esc(t.title)}</h3>
      <div style="white-space:pre-wrap; font-size:13px; line-height:1.5; color:var(--text);">${esc(t.notes)}</div>
      <div class="form-btns">
        <button class="btn-sec" onclick="closeInfoModal()">Sluiten</button>
      </div>
    </div>
  </div>`;
  const div = document.createElement('div');
  div.id = 'infoModalWrap';
  div.innerHTML = html;
  document.body.appendChild(div);
}
function closeInfoModal() {
  document.getElementById('infoModalWrap')?.remove();
}

// ── Status (todo / bezig / done) ──
function getStatus(x) {
  if(x.status==='bezig' || x.status==='done' || x.status==='todo') return x.status;
  return x.done ? 'done' : 'todo';
}
function statusCls(x) {
  const st = getStatus(x);
  return st==='todo' ? '' : st;
}
function statusIcon(x) {
  const st = getStatus(x);
  return st==='done' ? '✓' : st==='bezig' ? '●' : '';
}
function slotBaseDate(id) { return id.slice(0,10); }
function isTaskDoneEffective(t) {
  if(t.done || t.status==='done') return true;
  const subs = t.subtasks||[];
  return subs.length>0 && subs.every(s=>s.done||s.status==='done');
}

function getTasksForSlot(slotId) { return APP_DATA.tasks[slotId] || []; }

// Past opgeslagen overrides (aanwezigheid-aanpassingen) toe op SCHEDULE / ANTON.
function applyOverrides() {
  Object.keys(APP_DATA.overrides || {}).forEach(slotId=>{
    const slot = SCHEDULE.find(s=>s.id===slotId);
    if(!slot) return;
    const ov = APP_DATA.overrides[slotId];
    if(ov.fl){
      slot.fl = {...(slot.fl||{})};
      Object.keys(ov.fl).forEach(k=>{
        if(ov.fl[k]===null) delete slot.fl[k];
        else slot.fl[k] = ov.fl[k];
      });
    }
    if(ov.anton){
      const v = ov.anton.v;
      if(v===null) delete ANTON[slotId];
      else ANTON[slotId] = v;
    }
    ['ae','rw','tw'].forEach(grp=>{
      if(ov[grp]){
        slot[grp] = {...(slot[grp]||{})};
        Object.keys(ov[grp]).forEach(k=>{
          if(ov[grp][k]===null) delete slot[grp][k];
          else slot[grp][k] = ov[grp][k];
        });
        if(Object.keys(slot[grp]).length===0) delete slot[grp];
      }
    });
  });
}

  return 0;

  const mat = t.materials || {};
  let n = 0;
  Object.keys(mat.items||{}).forEach(k=>{ if(getMaterialQty(mat,k)>0) n++; });
  if(mat.extra && mat.extra.trim()) n++;
  return n;
}

// ── Filter helpers (team / persoon) ──
function slotMatchesFilter(slot) {
  if(currentFilter==='all') return true;
  if(currentFilter.startsWith('team:')){
    const team = currentFilter.slice(5);
    if(team==='All Events') return !!slot.ae;
    if(team==='Radarwerk') return !!slot.rw;
    if(team==='Team Wauw') return !!slot.tw;
    return false;
  }
  if(currentFilter.startsWith('person:')){
    const key = currentFilter.slice(7);
    if(key==='anton') return ANTON[slot.id]===1;
    const fl = slot.fl||{};
    return fl[key]===1 || fl[key]===-1;
  }
  return true;
}
// Heeft deze dag (één van de slots) crew-aanwezigheid of taken?
function dayHasContent(dateStr) {
  const slots = SCHEDULE.filter(s=>slotBaseDate(s.id)===dateStr);
  return slots.some(s=>{
    if(ANTON[s.id]===1) return true;
    if(s.ae||s.rw||s.tw) return true;
    const fl = s.fl||{};
    if(Object.values(fl).some(v=>v===1||v===-1)) return true;
    if(getTasksForSlot(s.id).length>0) return true;
    return false;
  });
}
// Voortgang (subtaken/taken) voor een fase
function phaseProgress(phase) {
  let total=0, done=0;
  SCHEDULE.filter(s=>s.phase===phase).forEach(s=>{
    getTasksForSlot(s.id).forEach(t=>{
      const subs = t.subtasks||[];
      if(subs.length){
        subs.forEach(sub=>{ total++; if(getStatus(sub)==='done') done++; });
      } else {
        total++; if(getStatus(t)==='done') done++;
      }
    });
  });
  return {done, total};
}

// Geeft de datum (YYYY-MM-DD) van de maandag van de huidige week terug.
function mondayOfCurrentWeek() {
  const now = new Date();
  const day = now.getDay(); // 0=zo, 1=ma, ..., 6=za
  const diff = (day === 0) ? -6 : 1 - day; // stap terug naar maandag
  const mon = new Date(now);
  mon.setDate(now.getDate() + diff);
  return mon.toISOString().slice(0,10);
}

function togglePlanningPast() {
  planningShowPast = !planningShowPast;
  renderPhase();
}

function allUniqueDates() {
  const seen = new Set(); const dates = [];
  SCHEDULE.forEach(s=>{
    const d = slotBaseDate(s.id);
    if(!seen.has(d)){ seen.add(d); dates.push(d); }
  });
  return dates.sort();
}

function totalProgress() {
  let total=0, done=0;
  SCHEDULE.forEach(s=>{
    getTasksForSlot(s.id).forEach(t=>{
      const subs = t.subtasks||[];
      if(subs.length){ subs.forEach(sub=>{ total++; if(getStatus(sub)==='done') done++; }); }
      else { total++; if(getStatus(t)==='done') done++; }
    });
  });
  return {done, total};
}

function renderPhase() {
  let dates = allUniqueDates();
  if(hideEmptyDays) dates = dates.filter(d=>dayHasContent(d));

  const _t = new Date();
  const todayStr = `${_t.getFullYear()}-${String(_t.getMonth()+1).padStart(2,'0')}-${String(_t.getDate()).padStart(2,'0')}`;
  const pastDates = dates.filter(d=>d < todayStr);
  const upcomingDates = dates.filter(d=>d >= todayStr);

  let html = renderWorkingHoursCard();
  html += renderWeatherWidget();
  const prog = totalProgress();
  html += `<h2>Planning${prog.total?` <span class="progress-pill">✓ ${prog.done}/${prog.total} afgerond</span>`:''}</h2>`;

  if(upcomingDates.length===0 && pastDates.length===0){
    html += '<div class="empty-msg">Geen planningsdata beschikbaar.</div>';
  } else {
    if(upcomingDates.length>0){
      let cardsHtml = '';
      upcomingDates.forEach(d=>{ cardsHtml += renderDayCard(d); });
      if(cardsHtml) html += `<div class="home-grid">${cardsHtml}</div>`;
      else html += '<div class="empty-msg">Geen dagen gevonden voor deze selectie.</div>';
    } else {
      html += '<div class="empty-msg">Geen komende dagen.</div>';
    }

    if(pastDates.length>0){
      html += `<div class="past-toggle" onclick="togglePlanningPast()">🕘 Verleden <span class="past-arrow">${planningShowPast?'▾':'▸'}</span></div>`;
      if(planningShowPast){
        let pastCardsHtml = '';
        pastDates.forEach(d=>{ pastCardsHtml += renderDayCard(d); });
        if(pastCardsHtml) html += `<div class="past-panel"><div class="home-grid">${pastCardsHtml}</div></div>`;
      }
    }
  }

  document.getElementById('content').innerHTML = html;
  const weatherDone = updateWeatherWidget();

  setTimeout(()=>{ scrollToToday('instant'); }, 30);
  lastWeatherPromise = weatherDone;
  weatherDone.then(()=>{ if(lastWeatherPromise===weatherDone) scrollToToday('instant'); });
}

// Scrolt zodat de "vandaag"-kaart in beeld komt, zonder de werktijden- en weerkaart
// die erboven staan uit beeld te duwen.
function scrollToToday(behavior) {
  const todayCard = document.querySelector('.home-card.today');
  const content = document.getElementById('content');
  if(!todayCard || !content) return;
  const grid = document.querySelector('.home-grid');
  let headerOffset = 0;
  if(grid) {
    headerOffset = grid.getBoundingClientRect().top - content.getBoundingClientRect().top;
  }
  const targetY = content.scrollTop + (todayCard.getBoundingClientRect().top - content.getBoundingClientRect().top) - headerOffset;
  content.scrollTo({top: Math.max(0, targetY), behavior: behavior||'smooth'});
}

function renderTasksCalendarViewReadOnly() {
  const byDate = {};
  SCHEDULE.forEach(s=>{
    const date = slotBaseDate(s.id);
    const tasks = getTasksForSlot(s.id);
    if(tasks.length>0){
      if(!byDate[date]) byDate[date]=[];
      tasks.forEach(t=>byDate[date].push({ slotId:s.id, task:t }));
    }
  });
  const allSlotDates = {};
  SCHEDULE.forEach(s=>{ allSlotDates[slotBaseDate(s.id)]=true; });
  const allDateKeys = Object.keys(allSlotDates).sort();
  if(allDateKeys.length===0) return '<div class="empty-msg">Geen planningsdata beschikbaar.</div>';
  const first = new Date(allDateKeys[0]+'T00:00:00');
  const last = new Date(allDateKeys[allDateKeys.length-1]+'T00:00:00');
  let y=first.getFullYear(), m=first.getMonth();
  const endY=last.getFullYear(), endM=last.getMonth();
  const todayStr=new Date().toISOString().slice(0,10);
  let html='';
  while(y<endY||(y===endY&&m<=endM)){
    const daysInMonth=new Date(y,m+1,0).getDate();
    const firstDow=(new Date(y,m,1).getDay()+6)%7;
    html+=`<div class="tcal-month"><div class="tcal-month-label">${TCAL_MONTH_NAMES[m]} ${y}</div><div class="tcal-grid">`;
    TCAL_DOW_LABELS.forEach(d=>html+=`<div class="tcal-dow">${d}</div>`);
    for(let i=0;i<firstDow;i++) html+=`<div class="tcal-day empty"></div>`;
    for(let d=1;d<=daysInMonth;d++){
      const dateStr=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const isScheduled=allSlotDates[dateStr];
      const dayTasks=byDate[dateStr]||[];
      const isToday=dateStr===todayStr;
      let cls='tcal-day';
      if(!isScheduled) cls+=' tcal-no-slot';
      if(isToday) cls+=' tcal-today';
      if(dayTasks.length>0) cls+=' tcal-has-tasks';
      html+=`<div class="${cls}"><div class="tcal-daynum">${d}${isToday?'<span class="tcal-today-dot"></span>':''}</div>`;
      dayTasks.forEach(({slotId,task})=>{
        const stCls=statusCls(task);
        html+=`<div class="tcal-task-chip ${stCls}" onclick="openCalTaskModalReadOnly('${slotId}','${task.id}')" title="${esc(task.title)}">${esc(task.title)}</div>`;
      });
      html+='</div>';
    }
    html+='</div></div>';
    m++; if(m>11){m=0;y++;}
  }
  return html||'<div class="empty-msg">Nog geen taken aangemaakt.</div>';
}

// Locatie van het DreamVille-terrein (De Schorre, Boom) — pas aan indien nodig.
const WEATHER_LOCATION = { lat: 51.0926, lon: 4.3553, name: 'Boom (De Schorre)' };
const WEATHER_CACHE_KEY = 'dv26_weather_cache_v3';
const WEATHER_CACHE_TTL = 3 * 60 * 60 * 1000; // 3 uur

const WEATHER_INFO = {
  0:{icon:'☀️',label:'Helder'}, 1:{icon:'🌤️',label:'Grotendeels helder'}, 2:{icon:'⛅',label:'Bewolkt'}, 3:{icon:'☁️',label:'Overcast'},
  45:{icon:'🌫️',label:'Mist'}, 48:{icon:'🌫️',label:'Rijp/mist'},
  51:{icon:'🌦️',label:'Lichte motregen'}, 53:{icon:'🌦️',label:'Motregen'}, 55:{icon:'🌧️',label:'Zware motregen'},
  61:{icon:'🌦️',label:'Lichte regen'}, 63:{icon:'🌧️',label:'Regen'}, 65:{icon:'🌧️',label:'Zware regen'},
  71:{icon:'🌨️',label:'Lichte sneeuw'}, 73:{icon:'🌨️',label:'Sneeuw'}, 75:{icon:'❄️',label:'Zware sneeuw'},
  80:{icon:'🌦️',label:'Lichte buien'}, 81:{icon:'🌧️',label:'Buien'}, 82:{icon:'⛈️',label:'Zware buien'},
  95:{icon:'⛈️',label:'Onweer'}, 96:{icon:'⛈️',label:'Onweer + hagel'}, 99:{icon:'⛈️',label:'Zwaar onweer + hagel'},
};
function weatherInfo(code) { return WEATHER_INFO[code] || {icon:'🌡️', label:''}; }

function loadWeatherCache() {
  try { return JSON.parse(localStorage.getItem(WEATHER_CACHE_KEY)||'null'); } catch(e){ return null; }
}
function saveWeatherCache(data) {
  try { localStorage.setItem(WEATHER_CACHE_KEY, JSON.stringify({fetchedAt:Date.now(), data})); } catch(e){}
}
async function fetchWeather() {
  const cached = loadWeatherCache();
  if(cached && cached.data && (Date.now()-cached.fetchedAt) < WEATHER_CACHE_TTL) return cached.data;
  const url = `https://api.open-meteo.com/v1/forecast?latitude=${WEATHER_LOCATION.lat}&longitude=${WEATHER_LOCATION.lon}&daily=weathercode,temperature_2m_max,temperature_2m_min,precipitation_probability_max,precipitation_sum,windspeed_10m_max&timezone=Europe%2FBrussels&forecast_days=7`;
  const res = await fetch(url);
  if(!res.ok) throw new Error('weather fetch failed');
  const data = await res.json();
  saveWeatherCache(data);
  return data;
}
function weatherRisk(data, idx) {
  const d = data.daily;
  const max   = Math.round(d.temperature_2m_max[idx]);
  const prob  = d.precipitation_probability_max[idx] || 0;
  const sum   = d.precipitation_sum ? (d.precipitation_sum[idx] || 0) : 0;
  const code  = d.weathercode[idx];
  const wind  = d.windspeed_10m_max ? (d.windspeed_10m_max[idx] || 0) : 0;
  return {
    heat    : max  >= 34 ? 2 : max  >= 30 ? 1 : 0,
    rain    : (prob >= 80 || sum >= 25) ? 2 : (prob >= 50 || sum >= 10) ? 1 : 0,
    thunder : [96,99].includes(code) ? 2 : code === 95 ? 1 : 0,
    wind    : wind >= 60 ? 2 : wind >= 40 ? 1 : 0,
  };
}
function riskCls(r){ return r===2?'danger':r===1?'warn':''; }

function renderWeatherCard(label, dateStr, data) {
  const idx = data && data.daily ? (data.daily.time||[]).indexOf(dateStr) : -1;
  if(idx===-1) return `<div class="weather-card"><div class="weather-day">${label}</div><div class="weather-na">—</div></div>`;
  const info = weatherInfo(data.daily.weathercode[idx]);
  const max  = Math.round(data.daily.temperature_2m_max[idx]);
  const min  = Math.round(data.daily.temperature_2m_min[idx]);
  const risk = weatherRisk(data, idx);
  const top  = Math.max(risk.heat, risk.rain, risk.thunder, risk.wind);
  const cardCls = top===2?' risk-danger':top===1?' risk-warn':'';
  return `<div class="weather-card${cardCls}">
    <div class="weather-day">${label}</div>
    <div class="weather-icon" title="${esc(info.label)}">${info.icon}</div>
    <div class="weather-temp">${min}° / ${max}°</div>
    <div class="weather-indicators">
      <span class="wi ${riskCls(risk.heat)}"    title="Hitte">🌡️</span>
      <span class="wi ${riskCls(risk.rain)}"    title="Neerslag">💧</span>
      <span class="wi ${riskCls(risk.thunder)}" title="Onweer">⚡</span>
      <span class="wi ${riskCls(risk.wind)}"    title="Wind">💨</span>
    </div>
  </div>`;
}
function renderWeatherWidget(idPrefix) {
  return `<div class="weather-widget" id="${idPrefix||'weatherWidget'}"><div class="weather-loading">🌤️ Weer laden...</div></div>`;
}
async function updateWeatherWidget(idPrefix) {
  const el = document.getElementById(idPrefix||'weatherWidget');
  if(!el) return;
  const now = new Date();
  const DAY_LABELS = ['Vandaag','Morgen','Overmorgen','',''];
  const WD_LABELS = ['zo','ma','di','wo','do','vr','za'];
  try {
    const data = await fetchWeather();
    let cards = '';
    for(let i=0;i<5;i++){
      const dt = new Date(now.getTime()+i*24*60*60*1000);
      const label = DAY_LABELS[i] || WD_LABELS[dt.getDay()];
      cards += renderWeatherCard(label, toLocalISO(dt), data);
    }
    el.innerHTML = `<div class="weather-loc">📍 Weer ${esc(WEATHER_LOCATION.name)}</div><div class="weather-row">${cards}</div>`;
  } catch(e) {
    el.innerHTML = '<div class="weather-na">⚠️ Weer kon niet geladen worden (geen verbinding?).</div>';
  }
}

// MATERIAALPLANNING (alleen-lezen, piekbehoefte per week)
// ═══════════════════════════════════════════════════════
function toLocalISO(dt) {
  return `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`;
}
function isoWeekNumber(dt) {
  const d = new Date(dt.getFullYear(), dt.getMonth(), dt.getDate());
  const dayNum = d.getDay() || 7; // 1=ma..7=zo
  d.setDate(d.getDate() + 4 - dayNum); // naar donderdag van deze week
  const yearStart = new Date(d.getFullYear(), 0, 1);
  return Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
}
function getWeekKey(dateStr) {
  const [y,m,d] = dateStr.split('-').map(Number);
  const dt = new Date(y, m-1, d);
  const day = dt.getDay(); // 0=zo..6=za
  const diff = (day===0 ? -6 : 1-day); // terug naar maandag
  dt.setDate(dt.getDate()+diff);
  return toLocalISO(dt); // blijft lokale datum (geen UTC-verschuiving)
}
function fmtWeekLabel(weekStart) {
  const [y,m,d] = weekStart.split('-').map(Number);
  const start = new Date(y, m-1, d);
  const end = new Date(start); end.setDate(end.getDate()+6);
  const f = dt=>`${dt.getDate()}/${dt.getMonth()+1}`;
  return `Week ${isoWeekNumber(start)} · ${f(start)} – ${f(end)}`;
}
function renderMaterialOverview() {
  let html = '<h2>🧰 Materiaalplanning</h2>';
  html += '<div class="mat-intro">Piekbehoefte per materiaal: het maximum dat op één dag binnen die week tegelijk nodig is, gebaseerd op de toegewezen taken.</div>';
  const phases = [['opbouw','Opbouw'],['show','Show'],['afbouw','Afbouw']];
  let any = false;
  phases.forEach(([pkey,plabel])=>{
    const dates = uniqueDatesForPhase(pkey).filter(d=>{
      return SCHEDULE.filter(s=>slotBaseDate(s.id)===d).some(s=>slotMatchesFilter(s));
    });
    if(dates.length===0) return;
    const weeks = {};
    dates.forEach(d=>{ (weeks[getWeekKey(d)] = weeks[getWeekKey(d)]||[]).push(d); });
    let phaseHtml = '';
    Object.keys(weeks).sort().forEach(wk=>{
      const dayTotals = {};
      const extras = new Set();
      weeks[wk].forEach(d=>{
        const dayTotal = {};
        SCHEDULE.filter(s=>slotBaseDate(s.id)===d && slotMatchesFilter(s)).forEach(s=>{
          getTasksForSlot(s.id).forEach(t=>{
            const mat = t.materials||{};
            Object.keys(mat.items||{}).forEach(k=>{
              const q = getMaterialQty(mat,k);
              if(q>0) dayTotal[k] = (dayTotal[k]||0)+q;
            });
            if(mat.extra && mat.extra.trim()) extras.add(mat.extra.trim());
          });
        });
        Object.keys(dayTotal).forEach(k=>{ (dayTotals[k]=dayTotals[k]||[]).push(dayTotal[k]); });
      });
      const keys = Object.keys(dayTotals);
      if(keys.length===0 && extras.size===0) return;
      let pillsHtml = keys.map(k=>{
        const peak = Math.max(...dayTotals[k]);
        const label = (MATERIAL_ITEMS.find(m=>m.key===k)||{label:k}).label;
        return `<span class="mat-pill">${esc(label)}: ${peak}x</span>`;
      }).join('');
      phaseHtml += `<div class="mat-week"><div class="mat-week-title">${fmtWeekLabel(wk)}</div>
        ${pillsHtml?`<div class="mat-pills">${pillsHtml}</div>`:''}
        ${extras.size?`<div class="mat-ro-extra">Extra: ${esc([...extras].join(', '))}</div>`:''}
      </div>`;
    });
    if(phaseHtml){
      any = true;
      html += `<div class="sec-title"><h3>${plabel}</h3></div>${phaseHtml}`;
    }
  });
  if(!any) html += '<div class="empty-msg">Nog geen materiaal toegewezen aan taken voor deze selectie.</div>';
  document.getElementById('content').innerHTML = html;
}

// ═══════════════════════════════════════════════════════
// LIVE LOCATIE (vergelijkbaar met SW Maps): toont de GPS-positie
// van het bezoekende toestel op een kaart.
//
// Zodra het gegeorefereerde terreinplan beschikbaar is, vul je hier
// PLAN_OVERLAY in met de afbeelding + de GPS-coördinaten van de
// hoekpunten (zoals in SW Maps). Bv:
// const PLAN_OVERLAY = {
//   url: 'terreinplan.png',
//   bounds: [[51.0000, 4.0000], [51.0050, 4.0100]] // [[zuidwest],[noordoost]]
// };
// Zolang dit op null staat, wordt een gewone OpenStreetMap-kaart getoond.
// ═══════════════════════════════════════════════════════
const PLAN_OVERLAY = null;

let locatieMap = null, locatieMarker = null, locatieCircle = null, locatieWatchId = null;

function renderLocatieView() {
  let html = '<h2>📍 Live locatie</h2>';
  html += '<div class="mat-intro">Toont je huidige GPS-positie op de kaart, zoals in SW Maps. Geef toestemming voor locatie wanneer je browser dit vraagt. Het terreinplan met overlay volgt zodra de georeferentie beschikbaar is.</div>';
  html += '<div id="locatieStatus" style="font-size:12px;color:var(--muted);margin-bottom:10px;"></div>';
  html += '<div id="locatieMapEl" style="height:70vh;border-radius:10px;overflow:hidden;border:1px solid var(--border);"></div>';
  document.getElementById('content').innerHTML = html;

  if (locatieMap) { locatieMap.remove(); locatieMap = null; locatieMarker = null; locatieCircle = null; }
  locatieMap = L.map('locatieMapEl').setView([50.85, 4.35], 8);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19,
    attribution: '© OpenStreetMap'
  }).addTo(locatieMap);
  if (PLAN_OVERLAY) {
    L.imageOverlay(PLAN_OVERLAY.url, PLAN_OVERLAY.bounds).addTo(locatieMap);
    locatieMap.fitBounds(PLAN_OVERLAY.bounds);
  }
  startLocatieWatch();
}

function startLocatieWatch() {
  const statusEl = document.getElementById('locatieStatus');
  if (!navigator.geolocation) {
    if(statusEl) statusEl.textContent = '⚠️ Geolocatie wordt niet ondersteund door deze browser.';
    return;
  }
  if (locatieWatchId !== null) {
    navigator.geolocation.clearWatch(locatieWatchId);
    locatieWatchId = null;
  }
  statusEl.textContent = '⟳ Locatie zoeken...';
  locatieWatchId = navigator.geolocation.watchPosition(pos => {
    const { latitude, longitude, accuracy } = pos.coords;
    const st = document.getElementById('locatieStatus');
    if(st) st.textContent = `✓ Locatie gevonden (nauwkeurigheid ±${Math.round(accuracy)} m)`;
    if (!locatieMarker) {
      locatieMarker = L.circleMarker([latitude, longitude], { radius: 8, color: '#6c63ff', fillColor: '#6c63ff', fillOpacity: 0.9, weight: 2 }).addTo(locatieMap);
      locatieCircle = L.circle([latitude, longitude], { radius: accuracy, color: '#6c63ff', fillColor: '#6c63ff', fillOpacity: 0.1, weight: 1 }).addTo(locatieMap);
      locatieMap.setView([latitude, longitude], PLAN_OVERLAY ? locatieMap.getZoom() : 17);
    } else {
      locatieMarker.setLatLng([latitude, longitude]);
      locatieCircle.setLatLng([latitude, longitude]);
      locatieCircle.setRadius(accuracy);
    }
  }, err => {
    const st = document.getElementById('locatieStatus');
    if(st) st.textContent = '⚠️ Kon locatie niet ophalen: ' + err.message;
  }, { enableHighAccuracy: true, maximumAge: 5000, timeout: 10000 });
}

const OPENING_DATE = new Date(2026, 6, 16);
const CLOSING_DATE = new Date(2026, 6, 26);
function renderOpeningCountdown(){
  const el = document.getElementById('openingCountdown');
  if(!el) return;
  const now = new Date();
  const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  const diffDays = Math.round((OPENING_DATE - today) / 86400000);
  let cls = 'countdown', text;
  if(diffDays > 0){
    text = `🎪 Nog ${diffDays} dag${diffDays===1?'':'en'} tot opening`;
  } else if(diffDays === 0){
    cls += ' live';
    text = `🎪 Opening vandaag!`;
  } else if(today <= CLOSING_DATE){
    cls += ' live';
    text = `🎉 Festival bezig — dag ${diffDays*-1+1}`;
  } else {
    cls += ' past';
    text = `✓ Opening was ${diffDays*-1} dagen geleden`;
  }
  el.className = cls;
  el.textContent = text;
}

// ═══════════════════════════════════════════════════════
// CLOUD SYNC (alleen lezen — geen schrijfacties)
// ═══════════════════════════════════════════════════════
const syncEl = document.getElementById('syncIndicator');
function setSyncIndicator(s, lastSyncAt) {
  if(!syncEl) return;
  if(s==='syncing') syncEl.innerHTML = '<span style="color:var(--muted)">⟳ laden...</span>';
  else if(s==='error') syncEl.innerHTML = '<span style="color:var(--rw)">⚠ laden mislukt</span>';
  else syncEl.innerHTML = `<span style="color:var(--green)">✓ bijgewerkt ${lastSyncAt?lastSyncAt.toLocaleDateString('nl-BE',{day:'2-digit',month:'2-digit'})+' '+lastSyncAt.toLocaleTimeString('nl-BE',{hour:'2-digit',minute:'2-digit'}):''}</span>`;
}

async function loadCloudData() {
  setSyncIndicator('syncing');
  try {
    const res = await fetch(`https://api.jsonbin.io/v3/b/${SYNC.binId}/latest`, {
      headers: { 'X-Master-Key': SYNC.apiKey }
    });
    if(!res.ok) throw new Error('HTTP '+res.status);
    const json = await res.json();
    const cloud = json.record || {};
    APP_DATA = { tasks:{}, overrides:{}, notes:'', updatedAt:0, ...cloud };
    applyOverrides();
    setSyncIndicator('ok', new Date());
    render();
  } catch(e) {
    console.warn('Laden mislukt', e);
    setSyncIndicator('error');
  }
}

function autoPhase(){
  const d = new Date();
  const y=d.getFullYear(),m=d.getMonth()+1,dd=d.getDate();
  if(y===2026){
    if(m===6||(m===7&&dd<=15)) return 'opbouw';
    if(m===7&&dd>=16&&dd<=26) return 'show';
    if((m===7&&dd>=27)||m===8) return 'afbouw';
  }
  return 'opbouw';
}
currentPhase = autoPhase();
const activeTab = document.querySelector(`.ptab[data-phase="${currentPhase}"]`);
if(activeTab) activeTab.classList.add('active');
else document.querySelector('.ptab.op').classList.add('active');

renderOpeningCountdown();
render();

function contactLoad() {
  try { const d = JSON.parse(localStorage.getItem(CONTACTS_KEY)); return (d && d.length) ? d : DEFAULT_CONTACTS; }
  catch(e) { return DEFAULT_CONTACTS; }
}

function renderContactenView() {
  const data = contactLoad();
  let html = `<h2>📞 Contactenlijst</h2>`;

  data.forEach(group => {
    const rows = group.rows || group.roles || [];
    if(!rows.some(r => r.role || r.name || r.phone)) return; // sla lege groepen over
    html += `<div class="contact-group">
      <div class="contact-group-title">${group.title||''}</div>
      <div class="contact-col-header"><span>Functie</span><span>Naam</span><span>Nummer</span></div>
      <div class="contact-table">`;
    rows.forEach(r => {
      if(!r.role && !r.name && !r.phone) return;
      const phoneHtml = r.phone
        ? `<a class="contact-phone" href="tel:${r.phone}">${r.phone}</a>`
        : '<span class="contact-empty">—</span>';
      html += `<div class="contact-row cr-ro">
        <div class="contact-role">${r.role||'—'}</div>
        <div class="contact-name">${r.name||'<span class="contact-empty">—</span>'}</div>
        <div class="contact-tel">${phoneHtml}</div>
      </div>`;
    });
    html += `</div></div>`;
  });

  document.getElementById('content').innerHTML = html;
}
