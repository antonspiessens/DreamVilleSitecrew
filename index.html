<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DreamVille 2026 — Crewplanning</title>
<style>
:root {
  --bg: #0d0f18;
  --surface: #161926;
  --surface2: #1e2235;
  --border: #2a2f47;
  --text: #e4e8f5;
  --muted: #7a84a8;
  --accent: #6c63ff;
  --ae: #42a5f5;
  --rw: #ef5350;
  --tw: #ffa726;
  --fl: #ab47bc;
  --green: #4caf50;
  --yellow: #ffd54f;
  --ph-opbouw: #42a5f5;
  --ph-show: #ff6b35;
  --ph-afbouw: #4caf50;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; height: 100dvh; overflow: hidden; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; }

/* ── HEADER ── */
header { flex-shrink: 0; background: var(--surface); border-bottom: 1px solid var(--border); padding: 10px 18px; display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
.logo { font-size: 15px; font-weight: 800; letter-spacing: -0.3px; white-space: nowrap; }
.logo span { color: var(--accent); }
.countdown { padding: 4px 10px; border-radius: 10px; font-size: 11px; font-weight: 700; white-space: nowrap; background: rgba(255,213,80,.12); color: var(--yellow); border: 1px solid rgba(255,213,80,.25); }
.countdown.live { background: rgba(76,175,80,.15); color: var(--green); border-color: rgba(76,175,80,.3); }
.countdown.past { background: rgba(100,100,120,.1); color: var(--muted); border-color: var(--border); }
.phase-tabs { display: flex; gap: 4px; }
.ptab { padding: 5px 13px; border-radius: 20px; font-size: 11px; font-weight: 700; cursor: pointer; border: none; background: var(--surface2); color: var(--muted); transition: all 0.15s; letter-spacing: 0.03em; }
.ptab.op.active { background: rgba(66,165,245,.2); color: var(--ae); }
.ptab.sh.active { background: rgba(255,107,53,.2); color: var(--ph-show); }
.ptab.af.active { background: rgba(76,175,80,.2); color: var(--green); }
#editModeBtn.active { background: rgba(255,213,80,.18); color: var(--yellow); }

/* Edit mode cell hints */
body.edit-mode td.cc:not(.sec) { cursor: pointer; }
body.edit-mode td.cc:not(.sec):hover { outline: 2px dashed var(--yellow); outline-offset: -2px; }
.legend { margin-left: auto; display: flex; gap: 14px; flex-wrap: wrap; }
.li { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--muted); }
.ld { width: 9px; height: 9px; border-radius: 50%; }
.stats-bar { background: var(--surface2); border-bottom: 1px solid var(--border); padding: 6px 18px; display: flex; gap: 20px; font-size: 11px; color: var(--muted); flex-shrink: 0; }
.stat-item strong { color: var(--text); }

/* ── LAYOUT ── */
.app-body { flex: 1; display: flex; overflow: hidden; }

/* Sidebar nav */
.sidebar { width: 68px; flex-shrink: 0; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 8px 0; gap: 2px; overflow-y: auto; }
.nav-item { background: none; border: none; border-left: 3px solid transparent; color: var(--muted); cursor: pointer; padding: 11px 4px; display: flex; flex-direction: column; align-items: center; gap: 4px; font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; transition: all .15s; font-family: inherit; }
.nav-item .ni-icon { font-size: 18px; line-height: 1; }
.nav-item:hover { color: var(--text); background: var(--surface2); }
.nav-item.active { color: var(--accent); border-left-color: var(--accent); background: rgba(108,99,255,.08); }

.content-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }

.main { flex: 1; overflow: hidden; display: none; }
.main.active { display: flex; }
.grid-wrap { flex: 1; overflow: auto; position: relative; }

/* Generic page views */
.view-page { display: none; flex: 1; overflow-y: auto; padding: 20px; }
.view-page.active { display: block; }
.view-page h2 { margin-bottom: 14px; font-size: 18px; font-weight: 800; }
.fcard-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px,1fr)); gap: 12px; }
.fcard { background: var(--surface2); border: 1px solid var(--border); border-radius: 9px; padding: 12px 14px; }
.fcard .fc-name { font-weight: 700; font-size: 14px; margin-bottom: 2px; }
.fcard .fc-role { font-size: 11px; color: var(--muted); margin-bottom: 8px; }
.fcard .fc-label { font-size: 10px; color: var(--muted); text-transform: uppercase; font-weight: 700; letter-spacing: 0.06em; margin-bottom: 4px; }
.fcard .fc-list { font-size: 12px; line-height: 1.6; margin-bottom: 8px; }
.task-overview-day { font-size: 12px; font-weight: 700; color: var(--text); margin-bottom: 6px; cursor: pointer; }
.task-overview-day:hover { color: var(--accent); }
.task-overview-day .toh { color: var(--muted); font-weight: 400; font-size: 11px; }
.task-overview-day-row { display: flex; justify-content: space-between; align-items: center; gap: 10px; }
.task-overview-day-row .task-overview-day { margin-bottom: 0; }
.stat-card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px,1fr)); gap: 12px; margin-bottom: 20px; }
.stat-card { background: var(--surface2); border: 1px solid var(--border); border-radius: 9px; padding: 12px 14px; }
.stat-card .sc-title { font-weight: 800; font-size: 14px; margin-bottom: 8px; }
.stat-card .sc-row { font-size: 12px; line-height: 2; }

/* ── HOME DASHBOARD ── */
.hours-card { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; margin-bottom: 16px; }
.hours-title { font-size: 14px; font-weight: 800; margin-bottom: 10px; }
.hours-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px,1fr)); gap: 10px; margin-bottom: 10px; }
.hours-item { background: var(--bg); border: 1px solid var(--border); border-left-width: 3px; border-radius: 8px; padding: 8px 12px; font-size: 13px; }
.hours-item.ae { border-left-color: var(--ae); }
.hours-item.rw { border-left-color: var(--rw); }
.hours-item.tw { border-left-color: var(--tw); }
.hours-item b { display: block; font-size: 12px; color: var(--muted); margin-bottom: 2px; font-weight: 700; }
.hours-note { font-size: 12px; color: var(--muted); line-height: 1.6; }
.home-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px,1fr)); gap: 16px; align-items: start; }
.home-card { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; }
.home-card-head { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 10px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
.home-card-title { font-size: 15px; font-weight: 800; }
.home-card-date { font-size: 12px; color: var(--muted); }
.home-slot { margin-bottom: 14px; }
.home-slot:last-child { margin-bottom: 0; }
.home-slot-head { font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; cursor: pointer; display: flex; align-items: center; gap: 6px; }
.home-slot-head:hover { color: var(--accent); }
.home-slot-head .toh { font-weight: 400; text-transform: none; letter-spacing: normal; font-size: 11px; }
#notesArea { width: 100%; min-height: 60vh; background: var(--surface2); border: 1px solid var(--border); border-radius: 9px; color: var(--text); padding: 14px; font-size: 13px; font-family: inherit; resize: vertical; outline: none; }
#notesArea:focus { border-color: var(--accent); }

/* ── TABLE ── */
table { border-collapse: collapse; }
th, td { border: 1px solid var(--border); }

/* Frozen left */
.col-label { position: sticky; left: 0; z-index: 10; background: var(--surface); width: 168px; min-width: 168px; max-width: 168px; }
thead .col-label { z-index: 20; background: var(--surface); }

/* Row labels */
td.col-label { padding: 5px 12px; font-size: 12px; white-space: nowrap; }
td.col-label .rl-name { font-weight: 600; }
td.col-label .rl-role { font-size: 10px; color: var(--muted); }

/* Date header row */
th.dh { position: sticky; top: 0; z-index: 5; background: var(--surface); min-width: 64px; width: 64px; padding: 0; cursor: pointer; vertical-align: bottom; transition: background .12s; user-select: none; }
th.dh:hover { background: var(--surface2); }
th.dh.night { background: rgba(8,8,20,.5); }
th.dh.night:hover { background: rgba(20,15,50,.6); }
.dh-inner { display: flex; flex-direction: column; align-items: center; padding: 5px 3px 6px; gap: 1px; position: relative; }
.dh-phase-bar { height: 3px; width: 100%; margin-bottom: 3px; border-radius: 2px; }
.dh-wd { font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }
.dh-day { font-size: 14px; font-weight: 800; line-height: 1; }
.dh-mon { font-size: 10px; color: var(--muted); }
.dh-slot { font-size: 9px; font-weight: 700; letter-spacing: 0.04em; padding: 1px 5px; border-radius: 8px; margin-top: 2px; }
.dh-slot.dag { background: rgba(255,214,80,.15); color: #ffd44f; }
.dh-slot.nacht { background: rgba(100,80,200,.2); color: #a89ef5; }
.dh-start { font-size: 9px; color: var(--yellow); font-weight: 700; }
.dh-tbadge { background: var(--accent); color: #fff; border-radius: 8px; font-size: 9px; font-weight: 800; padding: 1px 5px; min-width: 16px; text-align: center; margin-top: 2px; }
th.dh.today .dh-inner { background: rgba(108,99,255,.12); }
th.dh.today .dh-day { color: #fff; }
th.dh.selected .dh-inner { background: rgba(108,99,255,.22); }

/* Section rows */
tr.sec td { background: var(--surface2); font-size: 10px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; padding: 3px 12px; border-top: 2px solid var(--border); }
tr.sec td.col-label { background: var(--surface2); }

/* Crew cells */
td.cc { min-width: 64px; width: 64px; height: 34px; padding: 2px 3px; text-align: center; vertical-align: middle; cursor: pointer; transition: background .1s; }
td.cc:hover { background: var(--surface2) !important; }
td.cc.selected { background: rgba(108,99,255,.18) !important; outline: 1px solid rgba(108,99,255,.5); outline-offset: -1px; }
td.cc.night-bg { background: rgba(5,5,18,.25); }
td.cc.inactive { cursor: default; }
.cb { display: inline-flex; align-items: center; justify-content: center; border-radius: 5px; font-size: 12px; font-weight: 800; width: 30px; height: 26px; }
.cb.ae { background: rgba(66,165,245,.2); color: var(--ae); }
.cb.rw { background: rgba(239,83,80,.2); color: var(--rw); }
.cb.tw { background: rgba(255,167,38,.2); color: var(--tw); }
.cb.na { color: var(--border); font-size: 16px; }
.fl-dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; }
.fl-dot.y { background: var(--green); }
.fl-dot.n { background: var(--border); }
.fl-dot.opt { background: var(--yellow); }
.task-dot { width: 5px; height: 5px; background: var(--accent); border-radius: 50%; position: absolute; top: 4px; right: 4px; }

/* ── SIDE PANEL ── */
.panel { width: 360px; min-width: 360px; background: var(--surface); border-left: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; transform: translateX(360px); transition: transform .22s cubic-bezier(.4,0,.2,1); }
.panel.open { transform: translateX(0); }
.ph { padding: 14px 18px 12px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: flex-start; flex-shrink: 0; }
.ph-title { font-size: 16px; font-weight: 800; }
.ph-sub { font-size: 12px; color: var(--muted); margin-top: 2px; }
.ph-close { background: none; border: none; color: var(--muted); font-size: 20px; cursor: pointer; line-height: 1; padding: 0; }
.ph-close:hover { color: var(--text); }
.pb { flex: 1; overflow-y: auto; padding: 14px 18px; }

/* Crew chips in panel */
.crew-chips { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 14px; }
.ck { padding: 4px 10px; border-radius: 10px; font-size: 11px; font-weight: 700; }
.ck.ae { background: rgba(66,165,245,.15); color: var(--ae); border: 1px solid rgba(66,165,245,.25); }
.ck.rw { background: rgba(239,83,80,.15); color: var(--rw); border: 1px solid rgba(239,83,80,.25); }
.ck.tw { background: rgba(255,167,38,.15); color: var(--tw); border: 1px solid rgba(255,167,38,.25); }
.ck.fl { background: rgba(171,71,188,.15); color: var(--fl); border: 1px solid rgba(171,71,188,.25); }
.ck.ti { background: rgba(255,213,80,.12); color: var(--yellow); border: 1px solid rgba(255,213,80,.2); }

/* Section title */
.sec-title { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
.sec-title h3 { font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.07em; }
.btn-primary { background: var(--accent); color: #fff; border: none; border-radius: 7px; padding: 6px 13px; font-size: 12px; font-weight: 700; cursor: pointer; transition: opacity .15s; }
.btn-primary:hover { opacity: .85; }

/* Task form */
.tform { background: var(--surface2); border-radius: 9px; padding: 12px; margin-bottom: 12px; border: 1px solid var(--border); }
.tform label { display: block; font-size: 10px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 4px; margin-top: 9px; }
.tform label:first-child { margin-top: 0; }
.tform input, .tform select, .tform textarea { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; color: var(--text); padding: 7px 10px; font-size: 13px; font-family: inherit; outline: none; }
.tform textarea { resize: vertical; min-height: 56px; }
.tform input:focus, .tform select:focus, .tform textarea:focus { border-color: var(--accent); }
.tform-row { display: flex; gap: 8px; }
.tform-row > div { flex: 1; }
.form-btns { display: flex; gap: 7px; margin-top: 10px; }
.btn-sec { background: var(--surface); color: var(--muted); border: 1px solid var(--border); border-radius: 7px; padding: 6px 13px; font-size: 12px; cursor: pointer; }
.btn-sec:hover { color: var(--text); }

/* Task items */
.ti-wrap { display: flex; flex-direction: column; gap: 7px; }
.titem { background: var(--surface2); border-radius: 9px; padding: 10px 11px; border: 1px solid var(--border); display: flex; gap: 9px; align-items: flex-start; }
.titem:hover { border-color: var(--border); }
.tcheck { width: 17px; height: 17px; min-width: 17px; border-radius: 4px; border: 2px solid var(--border); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 10px; transition: all .15s; margin-top: 1px; }
.tcheck.done { background: var(--green); border-color: var(--green); color: #fff; }
.tc-body { flex: 1; min-width: 0; }
.tc-title { font-size: 13px; font-weight: 600; color: var(--text); }
.tc-title.done { text-decoration: line-through; color: var(--muted); }
.tc-meta { display: flex; gap: 5px; align-items: center; margin-top: 3px; flex-wrap: wrap; }
.tc-assignee { font-size: 11px; color: var(--fl); font-weight: 600; }
.tc-prio { font-size: 10px; padding: 1px 6px; border-radius: 8px; font-weight: 700; }
.tc-prio.hoog { background: rgba(239,83,80,.2); color: #ef5350; }
.tc-prio.middel { background: rgba(255,167,38,.2); color: #ffa726; }
.tc-prio.laag { background: rgba(76,175,80,.2); color: #4caf50; }
.tc-team { font-size: 10px; padding: 1px 7px; border-radius: 8px; font-weight: 700; }
.tc-team.ae { background: rgba(66,165,245,.2); color: var(--ae); }
.tc-team.rw { background: rgba(239,83,80,.2); color: var(--rw); }
.tc-team.tw { background: rgba(255,167,38,.2); color: var(--tw); }
.tc-notes { font-size: 11px; color: var(--muted); margin-top: 4px; line-height: 1.4; }
.tc-subprogress { font-size: 10px; color: var(--muted); font-weight: 700; }
.subtasks { margin-top: 6px; display: flex; flex-direction: column; gap: 4px; padding-left: 2px; }
.subitem { display: flex; align-items: center; gap: 7px; }
.subcheck { width: 14px; height: 14px; min-width: 14px; border-radius: 4px; border: 2px solid var(--border); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 9px; transition: all .15s; }
.subcheck.done { background: var(--green); border-color: var(--green); color: #fff; }
.subtitle { font-size: 12px; color: var(--text); flex: 1; }
.subtitle.done { text-decoration: line-through; color: var(--muted); }
.sub-del { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 11px; padding: 2px 4px; border-radius: 4px; line-height: 1; }
.sub-del:hover { color: var(--text); background: var(--border); }
.sub-add-row { display: flex; gap: 6px; margin-top: 2px; }
.sub-add-row input { flex: 1; background: var(--bg); border: 1px solid var(--border); border-radius: 5px; color: var(--text); padding: 4px 8px; font-size: 12px; font-family: inherit; outline: none; }
.sub-add-row input:focus { border-color: var(--accent); }
.sub-add-row button { background: none; border: 1px solid var(--border); border-radius: 5px; color: var(--muted); cursor: pointer; font-size: 12px; padding: 4px 9px; font-weight: 700; }
.sub-add-row button:hover { color: var(--text); border-color: var(--accent); }
.tc-actions { display: flex; flex-direction: column; gap: 3px; }
.btn-icon { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 12px; padding: 3px 5px; border-radius: 4px; line-height: 1; }
.btn-icon:hover { color: var(--text); background: var(--border); }
.empty-msg { text-align: center; color: var(--muted); font-size: 13px; padding: 22px 0; }

/* Materiaalchecklist */
.tc-matbadge { font-size: 10px; color: var(--muted); font-weight: 700; }
.materials-toggle { margin-top: 6px; font-size: 11px; font-weight: 700; color: var(--muted); cursor: pointer; user-select: none; display: inline-flex; align-items: center; gap: 4px; }
.materials-toggle:hover { color: var(--text); }
.mat-arrow { font-size: 9px; }
.materials-panel { margin-top: 8px; padding-top: 8px; border-top: 1px dashed var(--border); }
.materials-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px,1fr)); gap: 6px 12px; margin-bottom: 8px; }
.mat-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text); cursor: pointer; }
.mat-item input { accent-color: var(--accent); width: 14px; height: 14px; cursor: pointer; }
.mat-extra { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; color: var(--text); padding: 7px 10px; font-size: 12px; font-family: inherit; outline: none; resize: vertical; min-height: 40px; }
.mat-extra:focus { border-color: var(--accent); }
.mat-extra::placeholder { color: var(--muted); }
.mat-day-block { margin-bottom: 18px; }
.mat-task { background: var(--surface2); border: 1px solid var(--border); border-radius: 9px; padding: 10px 11px; margin-bottom: 8px; }
.mat-task-head { margin-bottom: 8px; }
.mat-task-head .tc-meta { margin-top: 4px; }

/* ── MOBILE (telefoon/tablet) ── */
@media (max-width: 860px) {
  .panel {
    position: fixed;
    top: 0; right: 0; bottom: 0;
    width: 100%;
    min-width: 0;
    height: 100%;
    z-index: 100;
    transform: translateX(100%);
    box-shadow: -4px 0 24px rgba(0,0,0,.4);
  }
  .panel.open { transform: translateX(0); }
  header { padding: 8px 10px; gap: 8px; }
  .legend { display: none; }
  .logo { font-size: 13px; }
}
</style>
</head>
<body>
<header>
  <div class="logo">DreamVille <span>2026</span> — Crewplanning</div>
  <span id="openingCountdown" class="countdown"></span>
  <div class="phase-tabs" id="phaseTabs">
    <button class="ptab op" data-phase="opbouw">Opbouw</button>
    <button class="ptab sh" data-phase="show">Show</button>
    <button class="ptab af" data-phase="afbouw">Afbouw</button>
  </div>
  <button class="ptab" id="editModeBtn" onclick="toggleEditMode()" title="Klik op cellen om aanwezigheid/aantallen aan te passen">✏️ Bewerken</button>
  <button class="ptab" id="exportBtn" onclick="exportBackup()" title="Download een back-up (JSON) van alle taken, notities en aanpassingen">⬇️ Backup</button>
  <span id="syncIndicator" style="font-size:11px;"></span>
  <div class="legend">
    <div class="li"><div class="ld" style="background:var(--ae)"></div> All Events</div>
    <div class="li"><div class="ld" style="background:var(--rw)"></div> Radarwerk</div>
    <div class="li"><div class="ld" style="background:var(--tw)"></div> Team Wauw</div>
    <div class="li"><div class="ld" style="background:var(--fl)"></div> Freelancers</div>
  </div>
</header>
<div class="app-body">
  <nav class="sidebar" id="sidebar">
    <button class="nav-item active" data-view="home" title="Home"><span class="ni-icon">🏠</span>Home</button>
    <button class="nav-item" data-view="crew" title="Crewplanning"><span class="ni-icon">📅</span>Planning</button>
    <button class="nav-item" data-view="tasks" title="Takenoverzicht"><span class="ni-icon">✅</span>Taken</button>
    <button class="nav-item" data-view="materiaal" title="Materiaalchecklist"><span class="ni-icon">🧰</span>Materiaal</button>
    <button class="nav-item" data-view="freelancers" title="Freelancer-overzicht"><span class="ni-icon">👤</span>Freelance</button>
    <button class="nav-item" data-view="stats" title="Statistieken"><span class="ni-icon">📊</span>Stats</button>
    <button class="nav-item" data-view="notes" title="Notities"><span class="ni-icon">📝</span>Notities</button>
  </nav>
  <div class="content-area">

// Lokaal opgeslagen + optioneel gesynced via JSONBin (zie SYNC hieronder)
// ═══════════════════════════════════════════════════════
const STORAGE_KEY = 'dv26_data';

// Vul hier je JSONBin gegevens in om te synchroniseren tussen toestellen
// (pc + gsm). Leeg laten = alles blijft lokaal in deze browser.
const SYNC = {
  binId: '6a29df92da38895dfea9b044',
  apiKey: '$2a$10$iiFDK.OPrJBT.uKNd4Repufy7Eu9KryV42t3zOKl7jCw4lMEelWt6',
};

function emptyData() { return { tasks:{}, overrides:{}, notes:'', updatedAt:0 }; }

function loadData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if(raw) { const d = JSON.parse(raw); return {...emptyData(), ...d}; }
  } catch(e) {}
  // migratie van oude losse keys
  const d = emptyData();
  let hadOldData = false;
  try {
    const oldTasks = JSON.parse(localStorage.getItem('dv26_tasks'));
    if(oldTasks) { d.tasks = oldTasks; hadOldData = true; }
  } catch(e) {}
  try {
    const oldNotes = localStorage.getItem('dv26_notes');
    if(oldNotes) { d.notes = oldNotes; hadOldData = true; }
  } catch(e) {}
  // Geen lokale data: laat updatedAt op 0 zodat cloud-data (indien aanwezig)
  // dit nieuwe/lege toestel overschrijft i.p.v. omgekeerd.
  d.updatedAt = hadOldData ? Date.now() : 0;
  return d;
}

let APP_DATA = loadData();

function persistLocal() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(APP_DATA));
}

function saveData() {
  APP_DATA.updatedAt = Date.now();
  persistLocal();
  pushToCloud();
}

// ── Taken ──
function loadTasks() { return APP_DATA.tasks; }
function getTasksForSlot(slotId) { return APP_DATA.tasks[slotId] || []; }
function saveTasksForSlot(slotId, tasks) {
  APP_DATA.tasks[slotId] = tasks;
  saveData();
}

// ── Notities ──
function getNotes() { return APP_DATA.notes || ''; }
function setNotes(v) { APP_DATA.notes = v; saveData(); }

// ── Backup export ──
// Downloadt alle taken, notities en aanwezigheid-aanpassingen als JSON-bestand.
function exportBackup() {
  const data = JSON.stringify(APP_DATA, null, 2);
  const blob = new Blob([data], { type: 'application/json' });
  const url  = URL.createObjectURL(blob);
  const ts   = new Date().toISOString().slice(0,16).replace(/[:T]/g,'-');
  const a    = document.createElement('a');
  a.href = url;
  a.download = `dv26-crewplanning-backup-${ts}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

// ── Aanwezigheid-overrides ──
function setOverride(slotId, patch) {
  const ov = APP_DATA.overrides[slotId] || {};
  Object.keys(patch).forEach(grp=>{
    ov[grp] = {...(ov[grp]||{}), ...patch[grp]};
  });
  APP_DATA.overrides[slotId] = ov;
  saveData();
}

// Past alle opgeslagen overrides toe op SCHEDULE / ANTON.
// Idempotent: mag meermaals aangeroepen worden (bv. na cloud-sync).
function applyOverrides() {
  Object.keys(APP_DATA.overrides || {}).forEach(slotId=>{
    const slot = SCHEDULE.find(s=>s.id===slotId);
    if(!slot) return;
    const ov = APP_DATA.overrides[slotId];
    if(ov.fl){
      slot.fl = {...(slot.fl||{})};
      Object.keys(ov.fl).forEach(k=>{
        if(ov.fl[k]===null) delete slot.fl[k];
        else slot.fl[k] = ov.fl[k];
      });
    }
    if(ov.anton){
      const v = ov.anton.v;
      if(v===null) delete ANTON[slotId];
      else ANTON[slotId] = v;
    }
    ['ae','rw','tw'].forEach(grp=>{
      if(ov[grp]){
        slot[grp] = {...(slot[grp]||{})};
        Object.keys(ov[grp]).forEach(k=>{
          if(ov[grp][k]===null) delete slot[grp][k];
          else slot[grp][k] = ov[grp][k];
        });
        if(Object.keys(slot[grp]).length===0) delete slot[grp];
      }
    });
  });
}

// ═══════════════════════════════════════════════════════
// CLOUD SYNC (JSONBin) — optioneel
// ═══════════════════════════════════════════════════════
function syncConfigured() { return !!(SYNC.binId && SYNC.apiKey); }
let lastSyncAt = null;
let syncStatus = syncConfigured() ? 'idle' : 'off';

function setSyncStatus(s) {
  syncStatus = s;
  const el = document.getElementById('syncIndicator');
  if(el) el.innerHTML = syncStatusHtml();
}
function syncStatusHtml() {
  if(!syncConfigured()) return '<span style="color:var(--muted)" title="Alleen lokaal opgeslagen in deze browser">○ lokaal</span>';
  let label, color;
  if(syncStatus==='syncing') { label='⟳ synchroniseren...'; color='var(--muted)'; }
  else if(syncStatus==='error') { label='⚠ sync mislukt'; color='var(--rw)'; }
  else { label = lastSyncAt ? `✓ gesynced ${lastSyncAt.toLocaleTimeString('nl-BE',{hour:'2-digit',minute:'2-digit'})}` : '✓ sync actief'; color='var(--green)'; }
  return `<span style="color:${color}">${label}</span>`;
}

async function pullFromCloud() {
  if(!syncConfigured()) return;
  setSyncStatus('syncing');
  try {
    const res = await fetch(`https://api.jsonbin.io/v3/b/${SYNC.binId}/latest`, {
      headers: { 'X-Master-Key': SYNC.apiKey }
    });
    if(!res.ok) throw new Error('HTTP '+res.status);
    const json = await res.json();
    const cloud = json.record;
    if(cloud && (cloud.updatedAt||0) > (APP_DATA.updatedAt||0)){
      APP_DATA = {...emptyData(), ...cloud};
      persistLocal();
      applyOverrides();
      reRenderCurrentView();
    } else if(cloud && (cloud.updatedAt||0) < (APP_DATA.updatedAt||0)){
      // lokaal nieuwer dan cloud -> push
      pushToCloud();
    }
    lastSyncAt = new Date();
    setSyncStatus('ok');
  } catch(e) {
    console.warn('Sync (pull) mislukt', e);
    setSyncStatus('error');
  }
}

async function pushToCloud() {
  if(!syncConfigured()) return;
  setSyncStatus('syncing');
  try {
    const res = await fetch(`https://api.jsonbin.io/v3/b/${SYNC.binId}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json', 'X-Master-Key': SYNC.apiKey },
      body: JSON.stringify(APP_DATA)
    });
    if(!res.ok) throw new Error('HTTP '+res.status);
    lastSyncAt = new Date();
    setSyncStatus('ok');
  } catch(e) {
    console.warn('Sync (push) mislukt', e);
    setSyncStatus('error');
  }
}

// Freelancer-cel: cyclet door geen-data → aanwezig → afwezig → optie → geen-data
function cycleFreelancer(slotId, key) {
  const slot = SCHEDULE.find(s=>s.id===slotId);
  if(!slot) return;
  const fl = slot.fl || (slot.fl = {});
  const cur = fl[key];
  let next;
  if(cur===undefined) next = 1;
  else if(cur===1) next = 0;
  else if(cur===0) next = -1;
  else next = undefined; // was -1 (optie) -> terug naar geen data

  if(next===undefined) delete fl[key]; else fl[key] = next;
  setOverride(slotId, { fl: { [key]: next===undefined?null:next } });
  renderTable();
  if(selectedSlot===slotId) renderPanelBody(slotId);
}

// Anton-cel: cyclet door geen-data → aanwezig → afwezig → geen-data
function cycleAnton(slotId) {
  const cur = ANTON[slotId];
  let next;
  if(cur===undefined) next = 1;
  else if(cur===1) next = 0;
  else next = undefined;

  if(next===undefined) delete ANTON[slotId]; else ANTON[slotId] = next;
  setOverride(slotId, { anton: { v: next===undefined?null:next } });
  renderTable();
  if(selectedSlot===slotId) renderPanelBody(slotId);
}

// Crew-aantal (AE/RW/Wauw): vraagt nieuw aantal via prompt
function editCrewCount(slotId, group, field, label) {
  const slot = SCHEDULE.find(s=>s.id===slotId);
  if(!slot) return;
  const cur = slot[group] ? slot[group][field] : undefined;
  const dayLabel = slot.label + (slot.slot ? ' '+slot.slot : '');
  const input = prompt(`${label} — aantal voor ${dayLabel}:\n(laat leeg om te wissen)`, (cur===undefined||cur===null) ? '' : String(cur));
  if(input===null) return; // geannuleerd

  if(!slot[group]) slot[group] = {};
  let ovVal;
  if(input.trim()===''){
    delete slot[group][field];
    if(Object.keys(slot[group]).length===0) delete slot[group];
    ovVal = null;
  } else {
    const n = parseInt(input,10);
    if(isNaN(n) || n<0){ alert('Ongeldig getal.'); return; }
    slot[group][field] = n;
    ovVal = n;
  }
  setOverride(slotId, { [group]: { [field]: ovVal } });
  renderTable();
  if(selectedSlot===slotId) renderPanelBody(slotId);
}

  const presentFL = FREELANCERS.filter(f=>fl[f.key]===1||fl[f.key]===-1).map(f=>f.name);

  if(ANTON[slot.id]===1) opts += `<option ${currentAssignee==='Anton'?'selected':''}>Anton</option>`;
  if(slot.ae) opts += `<option ${currentAssignee==='All Events TL'?'selected':''}>All Events TL</option>`;
  if(slot.rw) opts += `<option ${currentAssignee==='Radarwerk TL'?'selected':''}>Radarwerk TL</option>`;
  presentFL.forEach(n=>{ opts += `<option ${currentAssignee===n?'selected':''}>${n}</option>`; });
  return opts;
}

function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ── Subtaken ──
function renderSubtasksHtml(slotId, t) {
  const subs = t.subtasks||[];
  let html = '<div class="subtasks">';
  subs.forEach(s=>{
    html += `<div class="subitem">
      <div class="subcheck ${s.done?'done':''}" onclick="toggleSubtask('${slotId}','${t.id}','${s.id}')">${s.done?'✓':''}</div>
      <div class="subtitle ${s.done?'done':''}">${esc(s.title)}</div>
      <button class="sub-del" onclick="deleteSubtask('${slotId}','${t.id}','${s.id}')" title="Verwijder subtaak">✕</button>
    </div>`;
  });
  html += `<div class="sub-add-row">
    <input type="text" placeholder="+ subtaak toevoegen..." onkeydown="if(event.key==='Enter'){event.preventDefault();addSubtask('${slotId}','${t.id}',this.value);this.value='';}" />
    <button onclick="addSubtask('${slotId}','${t.id}',this.previousElementSibling.value);this.previousElementSibling.value='';">+</button>
  </div></div>`;
  return html;
}

function subtaskProgressHtml(t) {
  const subs = t.subtasks||[];
  if(subs.length===0) return '';
  const done = subs.filter(s=>s.done).length;
  return `<span class="tc-subprogress">${done}/${subs.length} subtaken</span>`;
}

function toggleSubtask(slotId, taskId, subId) {
  const tasks = getTasksForSlot(slotId);
  const t = tasks.find(x=>x.id===taskId);
  const sub = t && (t.subtasks||[]).find(s=>s.id===subId);
  if(sub){ sub.done = !sub.done; saveTasksForSlot(slotId, tasks); }
  refreshTaskViews(slotId);
}

function addSubtask(slotId, taskId, title) {
  title = (title||'').trim();
  if(!title) return;
  const tasks = getTasksForSlot(slotId);
  const t = tasks.find(x=>x.id===taskId);
  if(t){
    if(!t.subtasks) t.subtasks = [];
    t.subtasks.push({id:Date.now().toString(), title, done:false});
    saveTasksForSlot(slotId, tasks);
  }
  refreshTaskViews(slotId);
}

function deleteSubtask(slotId, taskId, subId) {
  const tasks = getTasksForSlot(slotId);
  const t = tasks.find(x=>x.id===taskId);
  if(t){ t.subtasks = (t.subtasks||[]).filter(s=>s.id!==subId); saveTasksForSlot(slotId, tasks); }
  refreshTaskViews(slotId);
}

function refreshTaskViews(slotId) {
  if(currentView==='home'){ renderHomeView(); }
  else if(currentView==='tasks'){ renderTasksOverview(); }
  else if(currentView==='materiaal'){ renderMaterialsOverview(); }
  else { renderPanelBody(slotId); }
  renderTableHeaders();
}

// ── Materiaalchecklist (per taak) ──
function materialsCount(t) {
  const mat = t.materials || {};
  let n = Object.values(mat.items||{}).filter(Boolean).length;
  if(mat.extra && mat.extra.trim()) n++;
  return n;
}

function materialsBadgeHtml(t) {
  const n = materialsCount(t);
  if(n===0) return '';
  return `<span class="tc-matbadge">🧰 ${n}</span>`;
}

function renderMaterialsHtml(slotId, t) {
  const open = materialsOpenIds.has(t.id);
  const mat = t.materials || {items:{}, extra:''};
  const n = materialsCount(t);
  let html = `<div class="materials-toggle" onclick="toggleMaterialsPanel('${slotId}','${t.id}')">🧰 Materiaal${n?` (${n})`:''} <span class="mat-arrow">${open?'▾':'▸'}</span></div>`;
  if(open){
    html += '<div class="materials-panel"><div class="materials-grid">';
    MATERIAL_ITEMS.forEach(m=>{
      const checked = !!(mat.items||{})[m.key];
      html += `<label class="mat-item"><input type="checkbox" ${checked?'checked':''} onchange="toggleMaterialItem('${slotId}','${t.id}','${m.key}')"> ${m.label}</label>`;
    });
    html += '</div>';
    html += `<textarea class="mat-extra" placeholder="Extra materiaal (vrije tekst)..." onchange="setMaterialExtra('${slotId}','${t.id}',this.value)">${esc(mat.extra||'')}</textarea>`;
    html += '</div>';
  }
  return html;
}

function toggleMaterialsPanel(slotId, taskId) {
  if(materialsOpenIds.has(taskId)) materialsOpenIds.delete(taskId);
  else materialsOpenIds.add(taskId);
  refreshTaskViews(slotId);
}

function toggleMaterialItem(slotId, taskId, key) {
  const tasks = getTasksForSlot(slotId);
  const t = tasks.find(x=>x.id===taskId);
  if(t){
    if(!t.materials) t.materials = {items:{}, extra:''};
    if(!t.materials.items) t.materials.items = {};
    t.materials.items[key] = !t.materials.items[key];
    saveTasksForSlot(slotId, tasks);
  }
  refreshTaskViews(slotId);
}

function setMaterialExtra(slotId, taskId, val) {
  const tasks = getTasksForSlot(slotId);
  const t = tasks.find(x=>x.id===taskId);
  if(t){
    if(!t.materials) t.materials = {items:{}, extra:''};
    t.materials.extra = val;
    saveTasksForSlot(slotId, tasks);
  }
  refreshTaskViews(slotId);
}

// ═══════════════════════════════════════════════════════
// TASK ACTIONS
// ═══════════════════════════════════════════════════════
function showTaskForm(slotId) {
  editingTaskId = 'new';
  renderPanelBody(slotId);
  setTimeout(()=>document.getElementById('tf-title')?.focus(),50);
}

function saveTask(slotId, taskId) {
  const title = document.getElementById('tf-title')?.value?.trim();
  if(!title) { document.getElementById('tf-title').style.borderColor='#ef5350'; return; }
  const assignee = document.getElementById('tf-assignee')?.value||'';
  const priority = document.getElementById('tf-prio')?.value||'Middel';
  const notes = document.getElementById('tf-notes')?.value?.trim()||'';
  const team = document.getElementById('tf-team')?.value||'';
  const teamCountRaw = document.getElementById('tf-teamcount')?.value;
  const teamCount = (team && teamCountRaw!=='' && teamCountRaw!=null) ? Math.max(0, parseInt(teamCountRaw,10)||0) : null;
  const tasks = getTasksForSlot(slotId);
  if(taskId){
    const t = tasks.find(x=>x.id===taskId);
    if(t){ t.title=title; t.assignee=assignee; t.priority=priority; t.notes=notes; t.team=team; t.teamCount=teamCount; if(!t.subtasks) t.subtasks=[]; if(!t.materials) t.materials={items:{},extra:''}; }
  } else {
    tasks.push({id:Date.now().toString(),title,assignee,priority,notes,team,teamCount,done:false,subtasks:[],materials:{items:{},extra:''}});
  }
  saveTasksForSlot(slotId, tasks);
  editingTaskId = null;
  renderPanelBody(slotId);
  renderTableHeaders(); // update task badge counts
}

function cancelForm(slotId) {
  editingTaskId = null;
  renderPanelBody(slotId);
}

function toggleTask(slotId, taskId) {
  const tasks = getTasksForSlot(slotId);
  const t = tasks.find(x=>x.id===taskId);
  if(t) { t.done=!t.done; saveTasksForSlot(slotId,tasks); }
  if(currentView==='home'){ renderHomeView(); }
  else if(currentView==='tasks'){ renderTasksOverview(); }
  else { renderPanelBody(slotId); }
  renderTableHeaders();
}

function editTask(slotId, taskId) {
  editingTaskId = taskId;
  renderPanelBody(slotId);
  setTimeout(()=>document.getElementById('tf-title')?.focus(),50);
}

function deleteTask(slotId, taskId) {
  if(!confirm('Taak verwijderen?')) return;
  const tasks = getTasksForSlot(slotId).filter(t=>t.id!==taskId);
  saveTasksForSlot(slotId, tasks);
  if(currentView==='tasks'){ renderTasksOverview(); } else { renderPanelBody(slotId); }
  renderTableHeaders();
}

// Only re-render headers (for badge updates without full redraw)
function renderTableHeaders() {
  updateStats();
  // Re-render task badges in headers
  document.querySelectorAll('th.dh').forEach(th=>{
    const onclick = th.getAttribute('onclick');
    if(!onclick) return;
    const m = onclick.match(/selectSlot\('([^']+)'\)/);
    if(!m) return;
    const slotId = m[1];
    const tc = taskCount(slotId);
    let badge = th.querySelector('.dh-tbadge');
    if(tc>0){
      if(!badge){ badge=document.createElement('div'); badge.className='dh-tbadge'; th.querySelector('.dh-inner').appendChild(badge); }
      badge.textContent=tc;
    } else if(badge){ badge.remove(); }
  });
}

// ═══════════════════════════════════════════════════════
// SIDEBAR NAVIGATION / VIEWS
// ═══════════════════════════════════════════════════════
document.querySelectorAll('.nav-item').forEach(btn=>{
  btn.addEventListener('click',()=>switchView(btn.dataset.view));
});

function switchView(view) {
  currentView = view;
  document.querySelectorAll('.nav-item').forEach(b=>b.classList.toggle('active', b.dataset.view===view));
  document.querySelectorAll('.main, .view-page').forEach(v=>v.classList.remove('active'));
  document.getElementById('view-'+view).classList.add('active');
  if(view==='home'){ renderHomeView(); }
  else if(view==='crew'){ renderTable(); }
  else if(view==='tasks'){ renderTasksOverview(); }
  else if(view==='materiaal'){ renderMaterialsOverview(); }
  else if(view==='freelancers'){ renderFreelancersOverview(); }
  else if(view==='stats'){ renderStatsView(); }
  else if(view==='notes'){ renderNotesView(); }
}

// Jump from another view back to the crewplanning grid, on a specific slot
function goToSlot(slotId) {
  const slot = SCHEDULE.find(s=>s.id===slotId);
  if(!slot) return;
  currentPhase = slot.phase;
  document.querySelectorAll('.ptab[data-phase]').forEach(b=>b.classList.toggle('active', b.dataset.phase===slot.phase));
  switchView('crew');
  selectSlot(slotId);
}

// ── Home dashboard (vandaag, morgen & overmorgen) ──
function renderHomeView() {
  const now = new Date();
  const tomorrow = new Date(now.getTime() + 24*60*60*1000);
  const dayAfter = new Date(now.getTime() + 2*24*60*60*1000);
  const todayStr = now.toISOString().slice(0,10);
  const tomorrowStr = tomorrow.toISOString().slice(0,10);
  const dayAfterStr = dayAfter.toISOString().slice(0,10);

  let html = renderWorkingHoursCard();
  html += '<h2>Vandaag, morgen &amp; overmorgen</h2><div class="home-grid">';
  html += renderHomeDayCard('Vandaag', todayStr);
  html += renderHomeDayCard('Morgen', tomorrowStr);
  html += renderHomeDayCard('Overmorgen', dayAfterStr);
  html += '</div>';
  document.getElementById('view-home').innerHTML = html;
}

function renderWorkingHoursCard() {
  return `<div class="hours-card">
    <div class="hours-title">⏰ Werktijden</div>
    <div class="hours-grid">
      <div class="hours-item ae"><b>All Eventz &amp; Radar</b>08u00 – 17u30</div>
      <div class="hours-item tw"><b>Team Wauw</b>08u30 – 18u00</div>
    </div>
    <div class="hours-note">
      Alle ploegen stoppen een halfuur voor het einduur met werken op het veld om op te ruimen.<br>
      Een kwartier voor het einduur vertrekken ze naar het machinepark om op tijd uit te schrijven.
    </div>
  </div>`;
}

function fmtHomeDate(dateStr) {
  const [y,m,d] = dateStr.split('-').map(Number);
  const dt = new Date(y, m-1, d);
  return `${WD[dt.getDay()]} ${d}/${m}`;
}

function renderHomeDayCard(label, dateStr) {
  const slots = SCHEDULE.filter(s=>slotBaseDate(s.id)===dateStr);
  let body;
  if(slots.length===0){
    body = '<div class="empty-msg">Geen planningsdata voor deze dag.</div>';
  } else {
    body = slots.map(s=>renderHomeSlot(s)).join('');
  }
  return `<div class="home-card">
    <div class="home-card-head"><div class="home-card-title">${label}</div><div class="home-card-date">${fmtHomeDate(dateStr)}</div></div>
    ${body}
  </div>`;
}

function renderHomeSlot(slot) {
  let html = `<div class="home-slot">
    <div class="home-slot-head" onclick="goToSlot('${slot.id}')">${slot.label}${slot.slot?' — '+slot.slot:''} <span class="toh">↗ open in planning</span></div>`;

  // ── Aanwezigheden ──
  html += '<div class="crew-chips">';
  const antonPresent = ANTON[slot.id];
  if(antonPresent===1) html += `<span class="ck" style="background:rgba(167,139,250,.15);color:#a78bfa;border:1px solid rgba(167,139,250,.3)">✓ Anton aanwezig</span>`;
  else if(antonPresent===0) html += `<span class="ck" style="background:rgba(100,100,120,.1);color:var(--muted);border:1px solid var(--border)">✗ Anton afwezig</span>`;
  if(slot.ae) html += `<span class="ck ae">All Events: ${1+slot.ae.sh}</span>`;
  if(slot.rw) html += `<span class="ck rw">Radarwerk: ${1+slot.rw.arc}</span>`;
  if(slot.tw) {
    const n = slot.tw.pro+(slot.tw.senior||0)+slot.tw.junior;
    html += `<span class="ck tw">Team Wauw: ${n}</span>`;
  }
  const fl = slot.fl||{};
  FREELANCERS.forEach(f=>{
    if(fl[f.key]===1) html += `<span class="ck fl">${f.name.split(' ')[0]}</span>`;
    else if(fl[f.key]===-1) html += `<span class="ck fl" style="opacity:.6">${f.name.split(' ')[0]} (opt)</span>`;
  });
  if(antonPresent===undefined && !slot.ae && !slot.rw && !slot.tw && Object.keys(fl).length===0){
    html += '<span style="font-size:12px;color:var(--muted)">Geen aanwezigheden geregistreerd.</span>';
  }
  html += '</div>';

  // ── Taken ──
  const tasks = getTasksForSlot(slot.id);
  if(tasks.length===0){
    html += '<div class="empty-msg" style="padding:10px 0">Geen taken voor deze dag.</div>';
  } else {
    html += '<div class="ti-wrap">';
    tasks.forEach(t=>{ html += renderTaskItemOverview(slot.id, t); });
    html += '</div>';
  }

  html += '</div>';
  return html;
}

// ── Takenoverzicht ──
function renderTasksOverview() {
  const all = loadTasks();
  let html = `<div class="sec-title"><h2 style="margin-bottom:0">Takenoverzicht</h2><button class="btn-primary" onclick="showNewTaskForm()">+ Nieuwe taak</button></div>`;

  if(tvAddingTask){ html += renderNewTaskForm(); }

  const phases = [['opbouw','Opbouw'],['show','Show'],['afbouw','Afbouw']];
  let any = false;
  phases.forEach(([pkey,plabel])=>{
    const slots = SCHEDULE.filter(s=>s.phase===pkey && (all[s.id]||[]).length>0);
    if(slots.length===0) return;
    any = true;
    html += `<div class="sec-title"><h3>${plabel}</h3></div>`;
    slots.forEach(s=>{
      const tasks = all[s.id]||[];
      html += `<div style="margin-bottom:14px;">
        <div class="task-overview-day-row">
          <div class="task-overview-day" onclick="goToSlot('${s.id}')">${s.label}${s.slot?' — '+s.slot:''} <span class="toh">↗ open in planning</span></div>
          <button class="btn-icon" onclick="showNewTaskForm('${s.id}')" title="Taak toevoegen voor deze dag">+ Taak</button>
        </div>
        <div class="ti-wrap">`;
      tasks.forEach(t=>{ html += renderTaskItemOverview(s.id, t); });
      html += '</div></div>';
    });
  });
  if(!any && !tvAddingTask) html += '<div class="empty-msg">Nog geen taken aangemaakt.<br>Klik op "+ Nieuwe taak" om er een toe te voegen.</div>';
  document.getElementById('view-tasks').innerHTML = html;

  if(tvAddingTask){ setTimeout(()=>document.getElementById('ntf-title')?.focus(),50); }
}

// ── Nieuwe taak vanuit Takenoverzicht ──
function renderNewTaskForm() {
  if(tvNewTaskDay===null || !SCHEDULE.find(s=>s.id===tvNewTaskDay)){
    const todayStr = new Date().toISOString().slice(0,10);
    tvNewTaskDay = SCHEDULE.find(s=>slotBaseDate(s.id)===todayStr)?.id || SCHEDULE[0].id;
  }
  const slot = SCHEDULE.find(s=>s.id===tvNewTaskDay);
  const phaseLabels = {opbouw:'Opbouw', show:'Show', afbouw:'Afbouw'};

  SCHEDULE.forEach(s=>{
    dayOpts += `<option value="${s.id}" ${s.id===tvNewTaskDay?'selected':''}>${s.label}${s.slot?' — '+s.slot:''} (${phaseLabels[s.phase]||s.phase})</option>`;
  });

  return `
  <div class="tform" id="ntf-form">
    <label>Dag</label>
    <select id="ntf-day" onchange="onNewTaskDayChange(this.value)">${dayOpts}</select>
    <label>Taak</label>
    <input type="text" id="ntf-title" placeholder="Wat moet er gebeuren?" />
    <div class="tform-row">
      <div>
        <label>Verantwoordelijke</label>
        <select id="ntf-assignee">${assigneeOptionsHtml(slot)}</select>
      </div>
      <div>
        <label>Prioriteit</label>
        <select id="ntf-prio">
          <option>Laag</option>
          <option selected>Middel</option>
          <option>Hoog</option>
        </select>
      </div>
    </div>
    <div class="tform-row">
      <div>
        <label>Ploeg sitecrew</label>
        <select id="ntf-team" onchange="onTeamSelectChange(this,'${tvNewTaskDay}','ntf')">${teamOptionsHtml(slot)}</select>
      </div>
      <div>
        <label>Aantal crew</label>
        ${teamCountInputHtml('ntf', slot, '', null)}
      </div>
    </div>
    <label>Notities</label>
    <textarea id="ntf-notes" placeholder="Extra info..."></textarea>
    <div class="form-btns">
      <button class="btn-primary" onclick="saveNewTask()">Opslaan</button>
      <button class="btn-sec" onclick="cancelNewTask()">Annuleer</button>
    </div>

function onNewTaskDayChange(val) {
  tvNewTaskDay = val;
  const slot = SCHEDULE.find(s=>s.id===val);
  const aSel = document.getElementById('ntf-assignee');
  if(aSel && slot) aSel.innerHTML = assigneeOptionsHtml(slot);
  const tSel = document.getElementById('ntf-team');
  if(tSel && slot){
    tSel.innerHTML = teamOptionsHtml(slot);
    tSel.setAttribute('onchange', `onTeamSelectChange(this,'${val}','ntf')`);
    onTeamSelectChange(tSel, val, 'ntf');
  }
}

function showNewTaskForm(slotId) {
  tvAddingTask = true;
  if(slotId) tvNewTaskDay = slotId;
  renderTasksOverview();
}

function cancelNewTask() {
  tvAddingTask = false;
  renderTasksOverview();
}

function saveNewTask() {
  const slotId = document.getElementById('ntf-day')?.value;
  const title = document.getElementById('ntf-title')?.value?.trim();
  if(!title) { document.getElementById('ntf-title').style.borderColor='#ef5350'; return; }
  const assignee = document.getElementById('ntf-assignee')?.value || '';
  const priority = document.getElementById('ntf-prio')?.value || 'Middel';
  const notes = document.getElementById('ntf-notes')?.value?.trim() || '';
  const team = document.getElementById('ntf-team')?.value || '';
  const teamCountRaw = document.getElementById('ntf-teamcount')?.value;
  const teamCount = (team && teamCountRaw!=='' && teamCountRaw!=null) ? Math.max(0, parseInt(teamCountRaw,10)||0) : null;
  const tasks = getTasksForSlot(slotId);
  tasks.push({id:Date.now().toString(), title, assignee, priority, notes, team, teamCount, done:false, subtasks:[], materials:{items:{},extra:''}});
  saveTasksForSlot(slotId, tasks);
  tvAddingTask = false;
  renderTasksOverview();
  renderTableHeaders();
}

function renderTaskItemOverview(slotId, t) {
  const pCls = t.priority==='Hoog'?'hoog':t.priority==='Middel'?'middel':'laag';
  let teamHtml = '';
  if(t.team){
    const slot = SCHEDULE.find(s=>s.id===slotId);
    const max = teamMaxForSlot(slot, t.team);
    const cnt = (t.teamCount!=null && t.teamCount!=='') ? `${t.teamCount}${max?'/'+max:''}` : '';
    teamHtml = `<span class="tc-team ${teamClsForLabel(t.team)}">🧩 ${esc(t.team)}${cnt?` (${cnt})`:''}</span>`;
  }
  return `
  <div class="titem" id="ti-${t.id}">
    <div class="tcheck ${t.done?'done':''}" onclick="toggleTask('${slotId}','${t.id}')">${t.done?'✓':''}</div>
    <div class="tc-body">
      <div class="tc-title ${t.done?'done':''}">${esc(t.title)}</div>
      <div class="tc-meta">
        ${t.assignee?`<span class="tc-assignee">👤 ${esc(t.assignee)}</span>`:''}
        ${teamHtml}
        <span class="tc-prio ${pCls}">${t.priority}</span>
        ${subtaskProgressHtml(t)}
        ${materialsBadgeHtml(t)}
      </div>
      ${t.notes?`<div class="tc-notes">${esc(t.notes)}</div>`:''}
      ${renderSubtasksHtml(slotId, t)}
      ${renderMaterialsHtml(slotId, t)}
    </div>
    <div class="tc-actions">
      <button class="btn-icon" onclick="goToSlot('${slotId}')" title="Open dag">↗</button>
      <button class="btn-icon" onclick="deleteTask('${slotId}','${t.id}')" title="Verwijder">✕</button>
    </div>
  </div>`;
}

// ── Materiaalchecklist-overzicht ──
function renderMaterialsOverview() {
  const all = loadTasks();
  const todayStr = new Date().toISOString().slice(0,10);
  let html = '<h2>Materiaalchecklist</h2>';

  const renderDayBlock = (s, tasks) => {
    let h = `<div class="mat-day-block">
        <div class="task-overview-day" onclick="goToSlot('${s.id}')">${s.label}${s.slot?' — '+s.slot:''} <span class="toh">↗ open in planning</span></div>`;
    tasks.forEach(t=>{ h += renderMaterialsTaskRow(s.id, t); });
    h += '</div>';
    return h;
  };

  const phases = [['opbouw','Opbouw'],['show','Show'],['afbouw','Afbouw']];
  let any = false;
  let pastHtml = '';
  let anyPast = false;
  phases.forEach(([pkey,plabel])=>{
    const slots = SCHEDULE.filter(s=>s.phase===pkey && (all[s.id]||[]).length>0);
    if(slots.length===0) return;
    const upcoming = slots.filter(s=>slotBaseDate(s.id)>=todayStr);
    const past = slots.filter(s=>slotBaseDate(s.id)<todayStr);
    if(upcoming.length>0){
      any = true;
      html += `<div class="sec-title"><h3>${plabel}</h3></div>`;
      upcoming.forEach(s=>{ html += renderDayBlock(s, all[s.id]||[]); });
    }
    if(past.length>0){
      anyPast = true;
      pastHtml += `<div class="sec-title"><h3>${plabel}</h3></div>`;
      past.forEach(s=>{ pastHtml += renderDayBlock(s, all[s.id]||[]); });
    }
  });

  if(anyPast){
    any = true;
    html += `<div class="materials-toggle" onclick="toggleMaterialsPast()">🕘 Verleden <span class="mat-arrow">${materialsShowPast?'▾':'▸'}</span></div>`;
    if(materialsShowPast) html += `<div class="materials-panel">${pastHtml}</div>`;
  }

  if(!any) html += '<div class="empty-msg">Nog geen taken aangemaakt.<br>Voeg taken toe via "Taken" of "Planning" — hier kan je per taak het materiaal aanvinken.</div>';
  document.getElementById('view-materiaal').innerHTML = html;
}

function toggleMaterialsPast() {
  materialsShowPast = !materialsShowPast;
  renderMaterialsOverview();
}

function renderMaterialsTaskRow(slotId, t) {
  const pCls = t.priority==='Hoog'?'hoog':t.priority==='Middel'?'middel':'laag';
  const mat = t.materials || {items:{}, extra:''};
  let teamHtml = '';
  if(t.team){
    const slot = SCHEDULE.find(s=>s.id===slotId);
    const max = teamMaxForSlot(slot, t.team);
    const cnt = (t.teamCount!=null && t.teamCount!=='') ? `${t.teamCount}${max?'/'+max:''}` : '';
    teamHtml = `<span class="tc-team ${teamClsForLabel(t.team)}">🧩 ${esc(t.team)}${cnt?` (${cnt})`:''}</span>`;
  }
  let html = `<div class="mat-task" id="mat-${t.id}">
    <div class="mat-task-head">
      <div class="tc-title ${t.done?'done':''}">${esc(t.title)}</div>
      <div class="tc-meta">
        ${t.assignee?`<span class="tc-assignee">👤 ${esc(t.assignee)}</span>`:''}
        ${teamHtml}
        <span class="tc-prio ${pCls}">${t.priority}</span>
      </div>
    </div>
    <div class="materials-grid">`;
  MATERIAL_ITEMS.forEach(m=>{
    const checked = !!(mat.items||{})[m.key];
    html += `<label class="mat-item"><input type="checkbox" ${checked?'checked':''} onchange="toggleMaterialItem('${slotId}','${t.id}','${m.key}')"> ${m.label}</label>`;
  });
  html += '</div>';
  html += `<textarea class="mat-extra" placeholder="Extra materiaal (vrije tekst)..." onchange="setMaterialExtra('${slotId}','${t.id}',this.value)">${esc(mat.extra||'')}</textarea>`;
  html += '</div>';
  return html;
}

// ── Freelancer-overzicht ──
function renderFreelancersOverview() {
  let html = '<h2>Freelancer-overzicht</h2><div class="fcard-grid">';
  FREELANCERS.forEach(f=>{
    const present = [], optie = [];
    SCHEDULE.forEach(s=>{
      const v = (s.fl||{})[f.key];
      const lbl = s.label + (s.slot ? ' '+s.slot : '');
      if(v===1) present.push(lbl);
      else if(v===-1) optie.push(lbl);
    });
    html += `<div class="fcard">
      <div class="fc-name">${esc(f.name)}</div>
      <div class="fc-role">${esc(f.role)}</div>
      <div class="fc-label">Aanwezig (${present.length})</div>
      <div class="fc-list">${present.join(', ')||'—'}</div>
      ${optie.length?`<div class="fc-label" style="color:var(--yellow)">Optie (${optie.length})</div><div class="fc-list">${optie.join(', ')}</div>`:''}
    </div>`;
  });
  html += '</div>';
  document.getElementById('view-freelancers').innerHTML = html;
}

// ── Statistieken ──
function renderStatsView() {
  const allTasks = loadTasks();
  let html = '<h2>Statistieken</h2><div class="stat-card-grid">';
  const phases = [['opbouw','Opbouw','var(--ph-opbouw)'],['show','Show','var(--ph-show)'],['afbouw','Afbouw','var(--ph-afbouw)']];
  phases.forEach(([pkey,plabel,color])=>{
    const slots = SCHEDULE.filter(s=>s.phase===pkey);
    let totalTasks=0, doneTasks=0, totalCrew=0, flCount=0;
    slots.forEach(s=>{
      const t = allTasks[s.id]||[];
      totalTasks += t.length;
      doneTasks += t.filter(x=>x.done).length;
      totalCrew += crewTotal(s);
      Object.values(s.fl||{}).forEach(v=>{ if(v===1) flCount++; });
    });
    const activeDays = slots.filter(s=>crewTotal(s)>0 || Object.keys(s.fl||{}).length>0).length;
    html += `<div class="stat-card">
      <div class="sc-title" style="color:${color}">${plabel}</div>
      <div class="sc-row">
        <div><strong>${slots.length}</strong> shifts</div>
        <div><strong>${activeDays}</strong> actieve crewdagen</div>
        <div><strong>${totalCrew}</strong> crew (AE/RW/Wauw, cumulatief)</div>
        <div><strong>${flCount}</strong> freelancer-inzetten</div>
        <div><strong>${totalTasks}</strong> taken (<strong>${doneTasks}</strong> afgerond)</div>
      </div>
    </div>`;
  });
  html += '</div>';

  // Dagen zonder geplande crew of freelancers
  const gaps = SCHEDULE.filter(s=>crewTotal(s)===0 && Object.values(s.fl||{}).filter(v=>v===1).length===0);
  if(gaps.length){
    html += '<div class="sec-title"><h3>Dagen zonder geplande crew</h3></div>';
    html += `<div style="font-size:13px;line-height:1.9;color:var(--muted);">${gaps.map(s=>{
      const p = s.phase==='opbouw'?'Opbouw':s.phase==='show'?'Show':'Afbouw';
      return `${s.label}${s.slot?' '+s.slot:''} <span style="opacity:.6">(${p})</span>`;
    }).join(', ')}</div>`;
  }
  document.getElementById('view-stats').innerHTML = html;
}

// ── Notities ──
function renderNotesView() {
  const notes = getNotes();
  document.getElementById('view-notes').innerHTML = `
    <h2>Notities</h2>
    <textarea id="notesArea" placeholder="Vrije notities, to-do's, ideeën...">${esc(notes)}</textarea>
  `;
  let saveTimer = null;
  document.getElementById('notesArea').addEventListener('input', e=>{
    clearTimeout(saveTimer);
    const val = e.target.value;
    saveTimer = setTimeout(()=>setNotes(val), 500);
  });
}

// ═══════════════════════════════════════════════════════
// COUNTDOWN TOT OPENING
// ═══════════════════════════════════════════════════════
// Openingsdag = 16/07/2026 (uit Excel/PDF: "Days before opening" telt af naar 0 op 16/jul)
const OPENING_DATE = new Date(2026, 6, 16);
const CLOSING_DATE = new Date(2026, 6, 26); // laatste showdag

function renderOpeningCountdown(){
  const el = document.getElementById('openingCountdown');
  if(!el) return;
  const now = new Date();
  const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  const diffDays = Math.round((OPENING_DATE - today) / 86400000);

  let cls = 'countdown', text;
  if(diffDays > 0){
    text = `🎪 Nog ${diffDays} dag${diffDays===1?'':'en'} tot opening`;
  } else if(diffDays === 0){
    cls += ' live';
    text = `🎪 Opening vandaag!`;
  } else if(today <= CLOSING_DATE){
    cls += ' live';
    text = `🎉 Festival bezig — dag ${diffDays*-1+1}`;
  } else {
    cls += ' past';
    text = `✓ Opening was ${diffDays*-1} dagen geleden`;
  }
  el.className = cls;
  el.textContent = text;
}

// ═══════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════
// Auto-select phase based on today
function autoPhase(){
  const d = new Date();
  const y=d.getFullYear(),m=d.getMonth()+1,dd=d.getDate();
  if(y===2026){
    if(m===6||(m===7&&dd<=15)) return 'opbouw';
    if(m===7&&dd>=16&&dd<=26) return 'show';
    if((m===7&&dd>=27)||m===8) return 'afbouw';
  }
  return 'opbouw';
}
currentPhase = autoPhase();
const activeTab = document.querySelector(`.ptab[data-phase="${currentPhase}"]`);
if(activeTab){ activeTab.classList.add('active'); }
else { document.querySelector('.ptab.op').classList.add('active'); }

applyOverrides();
renderTable();
renderHomeView();
renderOpeningCountdown();
setSyncStatus(syncStatus);
