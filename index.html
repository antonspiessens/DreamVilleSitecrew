// ── Filter/zoekbalk Takenoverzicht ──
function taskMatchesFilters(t) {
  if(tvFilterAssignee && (t.assignee||'')!==tvFilterAssignee) return false;
  if(tvFilterStatus && getStatus(t)!==tvFilterStatus) return false;
  if(tvFilterPrio && (t.priority||'')!==tvFilterPrio) return false;
  if(tvFilterZone && (t.zone||'')!==tvFilterZone) return false;
  if(tvSearchQuery){
    const q = tvSearchQuery.trim().toLowerCase();
    if(q){
      const subtitles = (t.subtasks||[]).map(st=>st.title||'');
      const hay = [t.title||'', t.notes||'', t.assignee||'', ...subtitles].join(' ').toLowerCase();
      if(!hay.includes(q)) return false;
    }
  }
  return true;
}

function tasksFilterActive() {
  return !!(tvSearchQuery.trim() || tvFilterAssignee || tvFilterStatus || tvFilterPrio || tvFilterZone);
}

function renderTasksFilterBar(all) {
  const assignees = new Set();
  Object.values(all).forEach(arr=>(arr||[]).forEach(t=>{ if(t.assignee) assignees.add(t.assignee); }));
  const assigneeList = Array.from(assignees).sort((a,b)=>a.localeCompare(b,'nl'));
  let assigneeOpts = `<option value="">Alle verantwoordelijken</option>`;
  assigneeList.forEach(a=>{ assigneeOpts += `<option value="${esc(a)}" ${tvFilterAssignee===a?'selected':''}>${esc(a)}</option>`; });

  const zoneList = getAllZones();
  let zoneOpts = `<option value="">Alle zones</option>`;
  zoneList.forEach(z=>{ zoneOpts += `<option value="${esc(z)}" ${tvFilterZone===z?'selected':''}>${esc(z)}</option>`; });

  let html = `<div class="task-filter-bar">
    <input type="text" id="tvSearch" placeholder="🔍 Zoek op titel, notities, naam..." value="${esc(tvSearchQuery)}" oninput="onTasksFilterChange()">
    <select id="tvAssignee" onchange="onTasksFilterChange()">${assigneeOpts}</select>
    <select id="tvStatus" onchange="onTasksFilterChange()">
      <option value="">Alle statussen</option>
      <option value="todo" ${tvFilterStatus==='todo'?'selected':''}>Te doen</option>
      <option value="bezig" ${tvFilterStatus==='bezig'?'selected':''}>Bezig</option>
      <option value="done" ${tvFilterStatus==='done'?'selected':''}>Klaar</option>
    </select>
    <select id="tvPrio" onchange="onTasksFilterChange()">
      <option value="">Alle prioriteiten</option>
      <option value="Laag" ${tvFilterPrio==='Laag'?'selected':''}>Laag</option>
      <option value="Middel" ${tvFilterPrio==='Middel'?'selected':''}>Middel</option>
      <option value="Hoog" ${tvFilterPrio==='Hoog'?'selected':''}>Hoog</option>
    </select>
    <select id="tvZone" onchange="onTasksFilterChange()">${zoneOpts}</select>`;
  if(tasksFilterActive()) html += `<button class="btn-sec" onclick="resetTasksFilters()">✕ Wis filters</button>`;
  html += `</div>`;
  return html;
}

function onTasksFilterChange() {
  const searchEl = document.getElementById('tvSearch');
  const wasFocused = document.activeElement === searchEl;
  const cursorPos = searchEl ? searchEl.selectionStart : null;
  tvSearchQuery = searchEl ? searchEl.value : '';

// ── Materiaalchecklist-overzicht ──
function renderMaterialsOverview() {
  const all = loadTasks();
  const todayStr = new Date().toISOString().slice(0,10);
  let html = '<h2>Materiaalchecklist</h2>';

  html += `<div class="materials-toggle" onclick="toggleMaterialsWeekly()">🗓️ Wekelijks overzicht (piekbehoefte) <span class="mat-arrow">${materialsShowWeekly?'▾':'▸'}</span></div>`;
  if(materialsShowWeekly) html += `<div class="materials-panel">${renderWeeklyMaterialsOverview(false)}</div>`;
  const pastWeeklyHtml = renderWeeklyMaterialsOverview(true);

  const renderDayBlock = (s, tasks) => {
    let h = `<div class="mat-day-block">
        <div class="task-overview-day-row">
          <div class="task-overview-day" onclick="goToSlot('${s.id}')">${s.label}${s.slot?' — '+s.slot:''} <span class="toh">↗ open in planning</span></div>
          <button class="btn-icon mat-copy-btn" onclick="copyMaterialsForDay('${s.id}', this)" title="Kopieer materiaallijst naar klembord">📋 Kopieer</button>
        </div>
        ${materialConflictWarningHtml(s.id)}`;
    tasks.forEach(t=>{ h += renderMaterialsTaskRow(s.id, t); });
    h += '</div>';
    return h;
  };

  const phases = [['opbouw','Opbouw'],['show','Show'],['afbouw','Afbouw']];
  let any = false;
  let pastHtml = '';
  let anyPast = false;
  phases.forEach(([pkey,plabel])=>{
    const slots = SCHEDULE.filter(s=>s.phase===pkey && (all[s.id]||[]).length>0);
    if(slots.length===0) return;
    const upcoming = slots.filter(s=>slotBaseDate(s.id)>=todayStr);
    const past = slots.filter(s=>slotBaseDate(s.id)<todayStr);
    if(upcoming.length>0){
      any = true;
      html += `<div class="sec-title"><h3>${plabel}</h3></div>`;
      upcoming.forEach(s=>{ html += renderDayBlock(s, all[s.id]||[]); });
    }
    if(past.length>0){
      anyPast = true;
      pastHtml += `<div class="sec-title"><h3>${plabel}</h3></div>`;
      past.forEach(s=>{ pastHtml += renderDayBlock(s, all[s.id]||[]); });
    }
  });

  if(anyPast || pastWeeklyHtml){
    any = true;
    html += `<div class="materials-toggle" onclick="toggleMaterialsPast()">🕘 Verleden <span class="mat-arrow">${materialsShowPast?'▾':'▸'}</span></div>`;
    if(materialsShowPast){
      let pastPanel = '';
      if(pastWeeklyHtml) pastPanel += `<div class="sec-title"><h3>Wekelijks overzicht (piekbehoefte)</h3></div>${pastWeeklyHtml}`;
      pastPanel += pastHtml;
      html += `<div class="materials-panel">${pastPanel}</div>`;
    }
  }

  if(!any) html += '<div class="empty-msg">Nog geen taken aangemaakt.<br>Voeg taken toe via "Taken" of "Planning" — hier kan je per taak het materiaal aanvinken.</div>';
  document.getElementById('view-materiaal').innerHTML = html;
}

  materialsShowPast = !materialsShowPast;
  renderMaterialsOverview();
}

// ── Materiaallijst per dag kopiëren ──
function buildMaterialsTextForDay(slotId) {
  const slot = SCHEDULE.find(s=>s.id===slotId);
  const tasks = getTasksForSlot(slotId);
  const totals = {};
  const extras = [];
  tasks.forEach(t=>{
    const mat = t.materials || {items:{}, extra:''};
    MATERIAL_ITEMS.forEach(m=>{
      const qty = getMaterialQty(mat, m.key);
      if(qty>0) totals[m.key] = (totals[m.key]||0) + qty;
    });
    if(mat.extra && mat.extra.trim()) extras.push({ text: mat.extra.trim(), task: t.title });
  });

  const lines = [];
  if(slot){
    const dateLabel = fmtHomeDate(slotBaseDate(slot.id));
    lines.push(`🧰 Materiaal — ${dateLabel} — ${slot.label}${slot.slot?' ('+slot.slot+')':''}`);

    // Aantal crew per ploeg
    const crewParts = [];
    let crewTotal = 0;
    if(slot.ae){ const n=1+(slot.ae.sh||0); crewParts.push(`All Events ${n}`); crewTotal+=n; }
    if(slot.rw){ const n=1+(slot.rw.arc||0); crewParts.push(`Radarwerk ${n}`); crewTotal+=n; }
    if(slot.tw){ const n=(slot.tw.pro||0)+(slot.tw.senior||0)+(slot.tw.junior||0); crewParts.push(`Team Wauw ${n}`); crewTotal+=n; }
    if(crewParts.length) lines.push(`👥 Crew: ${crewParts.join(' · ')} (totaal ${crewTotal})`);

    // Freelancers aanwezig
    const fl = slot.fl || {};
    const flNames = FREELANCERS.filter(f=>fl[f.key]===1||fl[f.key]===-1).map(f=> fl[f.key]===-1 ? `${f.name} (optie)` : f.name);
    if(flNames.length) lines.push(`👤 Freelancers: ${flNames.join(', ')}`);
  } else {
    lines.push(`🧰 Materiaal — ${slotId}`);
  }

  lines.push('');
  const itemLines = MATERIAL_ITEMS.filter(m=>totals[m.key]>0).map(m=>`- ${m.label}: ${totals[m.key]}x`);
  if(itemLines.length===0 && extras.length===0){
    lines.push('(geen materiaal aangevinkt)');
  } else {
    itemLines.forEach(l=>lines.push(l));
  }
  if(extras.length>0){
    lines.push('');
    lines.push('Extra:');
    extras.forEach(e=>lines.push(`- ${e.text} (${e.task})`));
  }
  return lines.join('\n');
}

function copyMaterialsForDay(slotId, btnEl) {
  const text = buildMaterialsTextForDay(slotId);
  const done = (ok)=>{
    if(!btnEl) return;
    const orig = btnEl.textContent;
    btnEl.textContent = ok ? '✓ Gekopieerd!' : '⚠ Kopiëren mislukt';
    setTimeout(()=>{ btnEl.textContent = orig; }, 1500);
  };
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(()=>done(true)).catch(()=>done(false));
  } else {
    done(false);
  }
}

  const summary = FREELANCERS.map(f=>{

  let totAanwezig=0, totOptie=0;
  html += `<table class="jo-table"><thead><tr><th>Naam</th><th>Rol</th><th>Aanwezig</th><th>Optie</th><th>Totaal</th></tr></thead><tbody>`;

    html += `<tr><td>${esc(f.name)}</td><td>${esc(f.role)}</td><td>${aanwezig}</td><td>${optie}</td><td><strong>${totaal}</strong></td></tr>`;
  });
  html += `<tr><td><strong>Totaal</strong></td><td></td><td><strong>${totAanwezig}</strong></td><td><strong>${totOptie}</strong></td><td><strong>${totAanwezig+totOptie}</strong></td></tr>`;
  html += `</tbody></table>`;

  html += '<div class="sec-title"><h3>Detail per freelancer</h3></div>';
  html += '<div class="fcard-grid">';
  FREELANCERS.forEach(f=>{
    const present = [], optie = [];
    SCHEDULE.forEach(s=>{
      const v = (s.fl||{})[f.key];
      const lbl = s.label + (s.slot ? ' '+s.slot : '');
      if(v===1) present.push(lbl);

  });

  document.getElementById('view-freelancers').innerHTML = html;
}

// ── Statistieken ──
function renderStatsView() {
  const allTasks = loadTasks();
  let html = '<h2>Statistieken</h2><div class="stat-card-grid">';
  const phases = [['opbouw','Opbouw','var(--ph-opbouw)'],['show','Show','var(--ph-show)'],['afbouw','Afbouw','var(--ph-afbouw)']];
  phases.forEach(([pkey,plabel,color])=>{
    const slots = SCHEDULE.filter(s=>s.phase===pkey);
    let totalTasks=0, doneTasks=0, totalCrew=0, flCount=0;
    slots.forEach(s=>{
      const t = allTasks[s.id]||[];
      totalTasks += t.length;
      doneTasks += t.filter(x=>x.done).length;
      totalCrew += crewTotal(s);
      Object.values(s.fl||{}).forEach(v=>{ if(v===1) flCount++; });
    });
    const activeDays = slots.filter(s=>crewTotal(s)>0 || Object.keys(s.fl||{}).length>0).length;
    html += `<div class="stat-card">
      <div class="sc-title" style="color:${color}">${plabel}</div>

        <div><strong>${slots.length}</strong> shifts</div>
        <div><strong>${activeDays}</strong> actieve crewdagen</div>
        <div><strong>${totalCrew}</strong> crew (AE/RW/Wauw, cumulatief)</div>
        <div><strong>${flCount}</strong> freelancer-inzetten</div>
        <div><strong>${totalTasks}</strong> taken (<strong>${doneTasks}</strong> afgerond)</div>

    </div>`;
  });
  html += '</div>';

  // Dagen zonder geplande crew of freelancers
  const gaps = SCHEDULE.filter(s=>crewTotal(s)===0 && Object.values(s.fl||{}).filter(v=>v===1).length===0);
  if(gaps.length){

    }).join(', ')}</div>`;
  }
  document.getElementById('view-stats').innerHTML = html;
}

// Blijvend overzicht van alle taken (per dag, met status, ploeg en subtaken),
// bedoeld als basis voor de planning van volgend jaar. Toont de huidige status
// op het moment van bekijken/exporteren (geen historische tijdstempels).
function renderJaaroverzichtView() {
  const all = loadTasks();
  let html = `<div class="sec-title"><h2 style="margin-bottom:0">Jaaroverzicht</h2><button class="btn-primary" onclick="exportJaaroverzichtCSV()">⬇️ Exporteer CSV</button></div>`;
  html += `<div style="font-size:12px;color:var(--muted);margin:-6px 0 14px;line-height:1.5;">Alle taken per dag met hun huidige status (open / bezig / klaar), ploeg en subtaken-voortgang. Handig als basis voor de planning van volgend jaar.</div>`;

  const phaseLabels = {opbouw:'Opbouw', show:'Show', afbouw:'Afbouw'};
  const statusLabels = {todo:'Open', bezig:'Bezig', done:'Klaar'};
  let any = false;
  ['opbouw','show','afbouw'].forEach(pkey=>{
    const slots = SCHEDULE.filter(s=>s.phase===pkey && (all[s.id]||[]).length>0);
    if(slots.length===0) return;
    any = true;
    html += `<div class="sec-title"><h3>${phaseLabels[pkey]}</h3></div>`;
    html += `<table class="jo-table"><thead><tr><th>Dag</th><th>Taak</th><th>Ploeg</th><th>Aantal</th><th>Verantw.</th><th>Status</th><th>Subtaken</th></tr></thead><tbody>`;
    slots.forEach(s=>{
      (all[s.id]||[]).forEach(t=>{
        const subs = t.subtasks||[];
        const subDone = subs.filter(x=>x.done).length;
        const st = getStatus(t);
        const cnt = (t.teamCount!=null && t.teamCount!=='') ? t.teamCount : '';
        html += `<tr>
          <td>${s.label}${s.slot?' — '+s.slot:''}</td>
          <td>${esc(t.title)}</td>
          <td>${t.team?esc(t.team):''}</td>
          <td>${cnt}</td>
          <td>${t.assignee?esc(t.assignee):''}</td>
          <td><span class="jo-status ${st}">${statusLabels[st]}</span></td>
          <td>${subs.length?`${subDone}/${subs.length}`:''}</td>
        </tr>`;
      });
    });
    html += `</tbody></table>`;
  });

  if(!any) html += '<div class="empty-msg">Nog geen taken aangemaakt.</div>';
  document.getElementById('view-jaaroverzicht').innerHTML = html;
}

  const phaseLabels = {opbouw:'Opbouw', show:'Show', afbouw:'Afbouw'};
  const statusLabels = {todo:'Open', bezig:'Bezig', done:'Klaar'};
  const rows = [['Datum','Dag','Fase','Taak','Ploeg','Aantal crew','Verantwoordelijke','Status','Subtaken klaar','Subtaken totaal','Prioriteit','Notities']];
  SCHEDULE.forEach(s=>{
    (all[s.id]||[]).forEach(t=>{
      const subs = t.subtasks||[];
      const st = getStatus(t);
      rows.push([
        slotBaseDate(s.id),
        s.label + (s.slot?' '+s.slot:''),
        phaseLabels[s.phase]||s.phase,
        t.title||'',
        t.team||'',
        (t.teamCount!=null && t.teamCount!=='') ? t.teamCount : '',
        t.assignee||'',
        statusLabels[st]||st,
        subs.filter(x=>x.done).length,
        subs.length,
        t.priority||'',
        t.notes||''
      ]);
    });
  });
  const csv = rows.map(r=>r.map(csvEscape).join(';')).join('\r\n');
  const blob = new Blob(['﻿'+csv], { type: 'text/csv;charset=utf-8;' });
  const url  = URL.createObjectURL(blob);
  const ts   = new Date().toISOString().slice(0,10);
  const a    = document.createElement('a');
  a.href = url;
  a.download = `dv26-jaaroverzicht-${ts}.csv`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function csvEscape(val) {
  const s = String(val==null?'':val);
  if(/[";\n\r]/.test(s)) return '"' + s.replace(/"/g,'""') + '"';
  return s;
}

// COUNTDOWN TOT OPENING
// ═══════════════════════════════════════════════════════
// Openingsdag = 16/07/2026 (uit Excel/PDF: "Days before opening" telt af naar 0 op 16/jul)
const OPENING_DATE = new Date(2026, 6, 16);
const CLOSING_DATE = new Date(2026, 6, 26); // laatste showdag

function renderOpeningCountdown(){
  const el = document.getElementById('openingCountdown');
  if(!el) return;
  const now = new Date();
  const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  const diffDays = Math.round((OPENING_DATE - today) / 86400000);

  let cls = 'countdown', text;
  if(diffDays > 0){
    text = `🎪 Nog ${diffDays} dag${diffDays===1?'':'en'} tot opening`;
  } else if(diffDays === 0){
    cls += ' live';
    text = `🎪 Opening vandaag!`;
  } else if(today <= CLOSING_DATE){
    cls += ' live';
    text = `🎉 Festival bezig — dag ${diffDays*-1+1}`;
  } else {
    cls += ' past';
    text = `✓ Opening was ${diffDays*-1} dagen geleden`;
  }
  el.className = cls;
  el.textContent = text;
}

// LIVE LOCATIE (vergelijkbaar met SW Maps): toont de GPS-positie
// van het bezoekende toestel op een kaart.
//
// Zodra het gegeorefereerde terreinplan beschikbaar is, vul je hier
// PLAN_OVERLAY in met de afbeelding + de GPS-coördinaten van de
// hoekpunten (zoals in SW Maps). Bv:
// const PLAN_OVERLAY = {
//   url: 'terreinplan.png',
//   bounds: [[51.0000, 4.0000], [51.0050, 4.0100]] // [[zuidwest],[noordoost]]
// };
// Zolang dit op null staat, wordt een gewone OpenStreetMap-kaart getoond.
// ═══════════════════════════════════════════════════════
const PLAN_OVERLAY = null;

let locatieMap = null, locatieMarker = null, locatieCircle = null, locatieWatchId = null;

function renderLocatieView() {
  const el = document.getElementById('view-locatie');
  if (!locatieMap) {
    el.innerHTML = `
      <h2>📍 Live locatie</h2>
      <p class="mat-intro">Toont je huidige GPS-positie op de kaart, zoals in SW Maps. Geef toestemming voor locatie wanneer je browser dit vraagt. Het terreinplan met overlay volgt zodra de georeferentie beschikbaar is.</p>
      <div id="locatieStatus" style="font-size:12px;color:var(--muted);margin-bottom:10px;"></div>
      <div id="locatieMapEl" style="height:70vh;border-radius:10px;overflow:hidden;border:1px solid var(--border);"></div>
    `;
    locatieMap = L.map('locatieMapEl').setView([50.85, 4.35], 8);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 19,
      attribution: '© OpenStreetMap'
    }).addTo(locatieMap);
    if (PLAN_OVERLAY) {
      L.imageOverlay(PLAN_OVERLAY.url, PLAN_OVERLAY.bounds).addTo(locatieMap);
      locatieMap.fitBounds(PLAN_OVERLAY.bounds);
    }
    startLocatieWatch();
  } else {
    setTimeout(() => locatieMap.invalidateSize(), 50);
  }
}

function startLocatieWatch() {
  const statusEl = document.getElementById('locatieStatus');
  if (!navigator.geolocation) {
    statusEl.textContent = '⚠️ Geolocatie wordt niet ondersteund door deze browser.';
    return;
  }
  statusEl.textContent = '⟳ Locatie zoeken...';
  if (locatieWatchId !== null) return;
  locatieWatchId = navigator.geolocation.watchPosition(pos => {
    const { latitude, longitude, accuracy } = pos.coords;
    statusEl.textContent = `✓ Locatie gevonden (nauwkeurigheid ±${Math.round(accuracy)} m)`;
    if (!locatieMarker) {
      locatieMarker = L.circleMarker([latitude, longitude], { radius: 8, color: '#6c63ff', fillColor: '#6c63ff', fillOpacity: 0.9, weight: 2 }).addTo(locatieMap);
      locatieCircle = L.circle([latitude, longitude], { radius: accuracy, color: '#6c63ff', fillColor: '#6c63ff', fillOpacity: 0.1, weight: 1 }).addTo(locatieMap);
      locatieMap.setView([latitude, longitude], PLAN_OVERLAY ? locatieMap.getZoom() : 17);
    } else {
      locatieMarker.setLatLng([latitude, longitude]);
      locatieCircle.setLatLng([latitude, longitude]);
      locatieCircle.setRadius(accuracy);
    }
  }, err => {
    statusEl.textContent = '⚠️ Kon locatie niet ophalen: ' + err.message;
  }, { enableHighAccuracy: true, maximumAge: 5000, timeout: 10000 });
}

// Auto-select phase based on today
function autoPhase(){
  const d = new Date();
  const y=d.getFullYear(),m=d.getMonth()+1,dd=d.getDate();
  if(y===2026){
    if(m===6||(m===7&&dd<=15)) return 'opbouw';
    if(m===7&&dd>=16&&dd<=26) return 'show';
    if((m===7&&dd>=27)||m===8) return 'afbouw';
  }
  return 'opbouw';
}

function contactLoad() {
  try { const d = JSON.parse(localStorage.getItem(CONTACTS_KEY)); return (d && d.length) ? d : DEFAULT_CONTACTS; }
  catch(e) { return DEFAULT_CONTACTS; }
}
function contactSave(data) { localStorage.setItem(CONTACTS_KEY, JSON.stringify(data)); }

function contactCollect() {
  const data = [];
  document.querySelectorAll('.cg-block').forEach(gEl => {
    const rows = [];
    gEl.querySelectorAll('.cr-row').forEach(rEl => {
      rows.push({
        role: rEl.querySelector('.cr-role').value,
        name: rEl.querySelector('.cr-name').value,
        phone: rEl.querySelector('.cr-phone').value,
      });
    });
    data.push({ title: gEl.querySelector('.cg-title-input').value, rows });
  });
  contactSave(data);
}

function contactAddRow(gi) { contactCollect(); const d = contactLoad(); d[gi].rows.push({role:'',name:'',phone:''}); contactSave(d); renderContactenView(); }
function contactDeleteRow(gi, ri) { contactCollect(); const d = contactLoad(); d[gi].rows.splice(ri,1); contactSave(d); renderContactenView(); }
function contactAddGroup() { contactCollect(); const d = contactLoad(); d.push({title:'Nieuwe groep',rows:[{role:'',name:'',phone:''}]}); contactSave(d); renderContactenView(); }
function contactDeleteGroup(gi) { if(!confirm('Groep verwijderen?')) return; contactCollect(); const d = contactLoad(); d.splice(gi,1); contactSave(d); renderContactenView(); }

function renderContactenView() {
  const el = document.getElementById('view-contacten');

  data.forEach((group, gi) => {

        <input class="cr-role" value="${esc(r.role)}" oninput="contactCollect()" placeholder="Functie">
